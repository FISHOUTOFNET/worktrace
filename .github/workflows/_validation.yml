name: Reusable validation

on:
  workflow_call:
    inputs:
      revision:
        description: Exact repository revision to validate
        required: true
        type: string
      run_node_tests:
        description: Run WebView Node behavior tests
        required: false
        type: boolean
        default: false
      run_build_smoke:
        description: Build the executable and per-user installer
        required: false
        type: boolean
        default: false

permissions:
  actions: read
  contents: read

env:
  PYTHONUTF8: "1"
  PYTHONIOENCODING: utf-8

jobs:
  python311:
    name: Python 3.11 full suite
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out exact revision
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.revision }}
          clean: true
          show-progress: false
          persist-credentials: false

      - name: Capture tested revision
        id: revision
        shell: pwsh
        run: |
          $testedSha = (git rev-parse HEAD).Trim()
          if ($testedSha -ne "${{ inputs.revision }}") {
            throw "Checked out $testedSha instead of requested revision ${{ inputs.revision }}"
          }
          "sha=$testedSha" | Add-Content -LiteralPath $env:GITHUB_OUTPUT -Encoding UTF8
          "tested_sha=$testedSha" | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Encoding UTF8
          Write-Host "tested_sha=$testedSha"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -q -r requirements.txt

      - name: Check test inventory
        run: python scripts/test_inventory.py --check

      - name: Compile Python
        id: compile
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "test-results" | Out-Null
          & python -m compileall -q worktrace scripts/pytest_diagnostics.py *> "test-results/compile.log"
          $compileExitCode = $LASTEXITCODE
          Write-Host "compile exit code: $compileExitCode"
          if ($compileExitCode -ne 0) {
            Get-Content -LiteralPath "test-results/compile.log" -Tail 120 |
              ForEach-Object { Write-Host $_ }
          }
          exit $compileExitCode

      - name: Run Python tests
        id: pytest
        shell: pwsh
        run: |
          $utf8 = [System.Text.UTF8Encoding]::new($false)
          [Console]::InputEncoding = $utf8
          [Console]::OutputEncoding = $utf8
          $OutputEncoding = $utf8
          $PSNativeCommandUseErrorActionPreference = $false

          New-Item -ItemType Directory -Force -Path "test-results" | Out-Null
          $pytestStartedAt = Get-Date
          & python -m pytest -q -ra --tb=short --color=no --cache-clear `
            --durations=25 --durations-min=0.2 `
            --junitxml="test-results/pytest-junit.xml" *> "test-results/pytest.log"
          $pytestExitCode = $LASTEXITCODE
          $pytestElapsedSeconds = ((Get-Date) - $pytestStartedAt).TotalSeconds

          Write-Host "pytest exit code: $pytestExitCode"
          Write-Host ("pytest elapsed seconds: {0:N2}" -f $pytestElapsedSeconds)
          if ($pytestExitCode -eq 0) {
            Get-Content -LiteralPath "test-results/pytest.log" -Tail 40 |
              ForEach-Object { Write-Host $_ }
          }
          else {
            Write-Host "pytest failed; compact diagnostics follow in the next step"
          }
          exit $pytestExitCode

      - name: Publish validation diagnostics
        id: diagnostics
        if: failure() && (steps.compile.outcome == 'failure' || steps.pytest.outcome == 'failure')
        shell: pwsh
        run: |
          if ("${{ steps.compile.outcome }}" -eq "failure") {
            Write-Host "=== COMPILE_FAILURE_BEGIN ==="
            if (Test-Path -LiteralPath "test-results/compile.log") {
              Get-Content -LiteralPath "test-results/compile.log" -Tail 200 |
                ForEach-Object { Write-Host $_ }
            }
            Write-Host "=== COMPILE_FAILURE_END ==="
          }
          elseif ("${{ steps.pytest.outcome }}" -eq "failure") {
            & python scripts/pytest_diagnostics.py `
              --junit "test-results/pytest-junit.xml" `
              --log "test-results/pytest.log" `
              --summary "$env:GITHUB_STEP_SUMMARY"
          }

      - name: "Failure summary (${{ steps.diagnostics.outputs.problem_count }}): ${{ steps.diagnostics.outputs.first_failure }}"
        if: failure() && steps.diagnostics.outputs.first_failure != ''
        shell: pwsh
        run: |
          Write-Host "failure_count=${{ steps.diagnostics.outputs.problem_count }}"
          Write-Host "first_failure=${{ steps.diagnostics.outputs.first_failure }}"
          Write-Host "first_location=${{ steps.diagnostics.outputs.first_location }}"

  python_failure_manifest:
    name: Complete Python failure manifest
    needs: python311
    if: ${{ always() && needs.python311.result == 'failure' }}
    runs-on: windows-latest
    timeout-minutes: 3
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Publish every failure node
        shell: pwsh
        run: |
          $jobs = gh api "/repos/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID/jobs?per_page=100" | ConvertFrom-Json
          $job = $jobs.jobs | Where-Object { $_.name -like '*Python 3.11 full suite' } | Select-Object -First 1
          if ($null -eq $job) { throw 'python_validation_job_not_found' }
          gh api "/repos/$env:GITHUB_REPOSITORY/actions/jobs/$($job.id)/logs" | Set-Content python-job.log -Encoding UTF8
          $lines = Get-Content python-job.log | ForEach-Object { $_ -replace '^\d{4}-\d{2}-\d{2}T\S+Z\s+', '' }
          $start = [Array]::IndexOf($lines, '=== PYTEST_FAILURE_MANIFEST_BEGIN ===')
          $end = [Array]::IndexOf($lines, '=== PYTEST_FAILURE_MANIFEST_END ===')
          if ($start -lt 0 -or $end -le $start) { throw 'pytest_failure_manifest_not_found' }
          $lines[$start..$end] | ForEach-Object { Write-Host $_ }

  python_failure_details:
    name: Complete Python failure details
    needs: python311
    if: ${{ always() && needs.python311.result == 'failure' }}
    runs-on: windows-latest
    timeout-minutes: 3
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Publish every failure detail
        shell: pwsh
        run: |
          $jobs = gh api "/repos/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID/jobs?per_page=100" | ConvertFrom-Json
          $job = $jobs.jobs | Where-Object { $_.name -like '*Python 3.11 full suite' } | Select-Object -First 1
          if ($null -eq $job) { throw 'python_validation_job_not_found' }
          gh api "/repos/$env:GITHUB_REPOSITORY/actions/jobs/$($job.id)/logs" | Set-Content python-job.log -Encoding UTF8
          $lines = Get-Content python-job.log | ForEach-Object { $_ -replace '^\d{4}-\d{2}-\d{2}T\S+Z\s+', '' }
          $start = [Array]::IndexOf($lines, '=== PYTEST_FAILURE_DETAILS_BEGIN ===')
          $end = [Array]::IndexOf($lines, '=== PYTEST_FAILURE_DETAILS_END ===')
          if ($start -lt 0 -or $end -le $start) { throw 'pytest_failure_details_not_found' }
          $section = $lines[($start + 1)..($end - 1)] -join "`n"
          $pattern = '(?ms)^--- \[(?<position>\d+/\d+)\] (?<node>.+?) ---\n(?<detail>.*?)(?=^--- \[|\z)'
          foreach ($match in [regex]::Matches($section, $pattern)) {
            $detail = [regex]::Replace($match.Groups['detail'].Value, '\s+', ' ').Trim()
            if ($detail.Length -gt 1000) { $detail = $detail.Substring(0, 997) + '...' }
            Write-Host "[$($match.Groups['position'].Value)] $($match.Groups['node'].Value) | $detail"
          }

  node:
    name: WebView Node behavior tests
    if: inputs.run_node_tests
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Check out exact revision
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.revision }}
          clean: true
          show-progress: false
          persist-credentials: false

      - name: Capture tested revision
        shell: pwsh
        run: |
          $testedSha = (git rev-parse HEAD).Trim()
          if ($testedSha -ne "${{ inputs.revision }}") {
            throw "Checked out $testedSha instead of requested revision ${{ inputs.revision }}"
          }
          "tested_sha=$testedSha" | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Encoding UTF8
          Write-Host "tested_sha=$testedSha"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Run WebView Node tests
        run: node --test tests/webview/*.test.js

  build:
    name: Windows package smoke
    if: inputs.run_build_smoke
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out exact revision
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.revision }}
          clean: true
          show-progress: false
          persist-credentials: false

      - name: Capture tested revision
        shell: pwsh
        run: |
          $testedSha = (git rev-parse HEAD).Trim()
          if ($testedSha -ne "${{ inputs.revision }}") {
            throw "Checked out $testedSha instead of requested revision ${{ inputs.revision }}"
          }
          "tested_sha=$testedSha" | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Encoding UTF8
          Write-Host "tested_sha=$testedSha"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --disable-pip-version-check -q -r requirements.txt
          python -m pip install --disable-pip-version-check -q pyinstaller

      - name: Build single-file exe
        run: python -m PyInstaller --noconfirm --clean WorkTrace.spec

      - name: Verify single-file exe
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath "dist\WorkTrace.exe")) {
            throw "dist\WorkTrace.exe was not generated"
          }

      - name: Build per-user installer
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts\build_windows_installer.ps1

      - name: Verify installer
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath "dist\WorkTrace-Setup.exe")) {
            throw "dist\WorkTrace-Setup.exe was not generated"
          }

      - name: Upload release smoke artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: worktrace-windows-smoke
          path: |
            dist/WorkTrace.exe
            dist/WorkTrace-Setup.exe
          if-no-files-found: error
          retention-days: 1
