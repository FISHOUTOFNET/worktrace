# FROZEN CI CONTRACT
# Failed tests must be fixed in production code or tests, not by reshaping this workflow.
# Modify this file only for action/runtime upgrades, security fixes, validation-scope
# changes, or a reproducible failure of the diagnostics protocol below.

name: Reusable validation

on:
  workflow_call:
    inputs:
      revision:
        description: Exact repository revision to validate
        required: true
        type: string
      run_node_tests:
        description: Run WebView Node behavior tests
        required: false
        type: boolean
        default: false
      run_build_smoke:
        description: Build the executable and per-user installer
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  PYTHONUTF8: "1"
  PYTHONIOENCODING: utf-8
  PYTHONFAULTHANDLER: "1"

jobs:
  python311:
    name: Python 3.11 full suite
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Check out exact revision
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.revision }}
          clean: true
          show-progress: false
          persist-credentials: false

      - name: Capture tested revision
        id: revision
        shell: pwsh
        run: |
          $testedSha = (git rev-parse HEAD).Trim()
          if ($testedSha -ne "${{ inputs.revision }}") {
            throw "Checked out $testedSha instead of requested revision ${{ inputs.revision }}"
          }
          "sha=$testedSha" | Add-Content -LiteralPath $env:GITHUB_OUTPUT -Encoding UTF8
          "tested_sha=$testedSha" | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Encoding UTF8
          Write-Host "tested_sha=$testedSha"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --disable-pip-version-check -q -r requirements.txt
          python -m pip install --disable-pip-version-check -q "pytest-timeout>=2.3,<3"

      - name: Check test inventory
        id: inventory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "test-results" | Out-Null
          & python scripts/test_inventory.py --check *> "test-results/inventory.log"
          $inventoryExitCode = $LASTEXITCODE
          Get-Content -LiteralPath "test-results/inventory.log" |
            ForEach-Object { Write-Host $_ }
          exit $inventoryExitCode

      - name: Compile Python
        id: compile
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "test-results" | Out-Null
          & python -m compileall -q worktrace scripts/pytest_diagnostics.py scripts/pytest_log_to_junit.py scripts/render_ci_api_summary.py *> "test-results/compile.log"
          $compileExitCode = $LASTEXITCODE
          Write-Host "compile exit code: $compileExitCode"
          if ($compileExitCode -ne 0) {
            Get-Content -LiteralPath "test-results/compile.log" -Tail 120 |
              ForEach-Object { Write-Host $_ }
          }
          exit $compileExitCode

      - name: Run Python tests
        id: pytest
        shell: pwsh
        run: |
          $utf8 = [System.Text.UTF8Encoding]::new($false)
          [Console]::InputEncoding = $utf8
          [Console]::OutputEncoding = $utf8
          $OutputEncoding = $utf8
          $PSNativeCommandUseErrorActionPreference = $false

          New-Item -ItemType Directory -Force -Path "test-results" | Out-Null
          $pytestStartedAt = Get-Date
          & python -m pytest -q -ra --tb=short --color=no --cache-clear `
            --timeout=90 --timeout-method=thread `
            --durations=25 --durations-min=0.2 `
            --junitxml="test-results/pytest-junit.xml" *> "test-results/pytest.log"
          $pytestExitCode = $LASTEXITCODE
          $pytestElapsedSeconds = ((Get-Date) - $pytestStartedAt).TotalSeconds

          Write-Host "pytest exit code: $pytestExitCode"
          Write-Host ("pytest elapsed seconds: {0:N2}" -f $pytestElapsedSeconds)
          if ($pytestExitCode -eq 0) {
            Get-Content -LiteralPath "test-results/pytest.log" -Tail 40 |
              ForEach-Object { Write-Host $_ }
          }
          else {
            Write-Host "pytest failed; compact diagnostics will be published by the fixed relay job"
          }
          exit $pytestExitCode

      - name: Publish validation diagnostics
        id: diagnostics
        if: failure()
        continue-on-error: true
        shell: pwsh
        run: |
          $artifactName = "validation-diagnostics-${{ inputs.revision }}"
          if ("${{ steps.inventory.outcome }}" -eq "failure") {
            & python scripts/pytest_diagnostics.py `
              --stage inventory `
              --log "test-results/inventory.log" `
              --output-dir "test-results" `
              --revision "${{ inputs.revision }}" `
              --artifact-name $artifactName `
              --summary "$env:GITHUB_STEP_SUMMARY"
          }
          elseif ("${{ steps.compile.outcome }}" -eq "failure") {
            & python scripts/pytest_diagnostics.py `
              --stage compile `
              --log "test-results/compile.log" `
              --output-dir "test-results" `
              --revision "${{ inputs.revision }}" `
              --artifact-name $artifactName `
              --summary "$env:GITHUB_STEP_SUMMARY"
          }
          elseif ("${{ steps.pytest.outcome }}" -eq "failure") {
            if (-not (Test-Path -LiteralPath "test-results/pytest-junit.xml")) {
              Write-Host "JUnit was not finalized; recovering partial results from pytest.log"
              & python scripts/pytest_log_to_junit.py `
                --log "test-results/pytest.log" `
                --output "test-results/pytest-junit.xml" `
                --timeout-seconds 90
              if ($LASTEXITCODE -ne 0) {
                Write-Warning "Partial JUnit recovery failed; diagnostics will use the log fallback"
              }
            }
            & python scripts/pytest_diagnostics.py `
              --stage pytest `
              --junit "test-results/pytest-junit.xml" `
              --log "test-results/pytest.log" `
              --output-dir "test-results" `
              --revision "${{ inputs.revision }}" `
              --artifact-name $artifactName `
              --summary "$env:GITHUB_STEP_SUMMARY"
          }

          if (Test-Path -LiteralPath "test-results/diagnostics.json") {
            & python scripts/render_ci_api_summary.py `
              --input "test-results/diagnostics.json" `
              --output "test-results/api-summary.txt" `
              --max-bytes 65536
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to render the fixed API diagnostics summary"
            }
          }
          else {
            throw "Canonical diagnostics.json was not generated"
          }

      - name: Upload Python failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: validation-diagnostics-${{ inputs.revision }}
          path: test-results/
          if-no-files-found: warn
          retention-days: 3

  python_diagnostics:
    name: Python failure diagnostics
    needs: python311
    if: ${{ always() && needs.python311.result == 'failure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Download canonical Python diagnostics
        uses: actions/download-artifact@v6
        with:
          name: validation-diagnostics-${{ inputs.revision }}
          path: test-results

      - name: Publish bounded API diagnostics
        shell: bash
        run: |
          test -f test-results/api-summary.txt
          cat test-results/api-summary.txt

  node:
    name: WebView Node behavior tests
    if: inputs.run_node_tests
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Check out exact revision
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.revision }}
          clean: true
          show-progress: false
          persist-credentials: false

      - name: Capture tested revision
        shell: pwsh
        run: |
          $testedSha = (git rev-parse HEAD).Trim()
          if ($testedSha -ne "${{ inputs.revision }}") {
            throw "Checked out $testedSha instead of requested revision ${{ inputs.revision }}"
          }
          "tested_sha=$testedSha" | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Encoding UTF8
          Write-Host "tested_sha=$testedSha"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Run WebView Node tests
        run: node --test tests/webview/*.test.js

  build:
    name: Windows package smoke
    if: inputs.run_build_smoke
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out exact revision
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.revision }}
          clean: true
          show-progress: false
          persist-credentials: false

      - name: Capture tested revision
        shell: pwsh
        run: |
          $testedSha = (git rev-parse HEAD).Trim()
          if ($testedSha -ne "${{ inputs.revision }}") {
            throw "Checked out $testedSha instead of requested revision ${{ inputs.revision }}"
          }
          "tested_sha=$testedSha" | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Encoding UTF8
          Write-Host "tested_sha=$testedSha"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --disable-pip-version-check -q -r requirements.txt
          python -m pip install --disable-pip-version-check -q pyinstaller

      - name: Build single-file exe
        run: python -m PyInstaller --noconfirm --clean WorkTrace.spec

      - name: Verify single-file exe
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath "dist\WorkTrace.exe")) {
            throw "dist\WorkTrace.exe was not generated"
          }

      - name: Build per-user installer
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts\build_windows_installer.ps1

      - name: Verify installer
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath "dist\WorkTrace-Setup.exe")) {
            throw "dist\WorkTrace-Setup.exe was not generated"
          }

      - name: Upload release smoke artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v6
        with:
          name: worktrace-windows-smoke
          path: |
            dist/WorkTrace.exe
            dist/WorkTrace-Setup.exe
          if-no-files-found: error
          retention-days: 1
