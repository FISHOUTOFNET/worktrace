# FROZEN CI CONTRACT
# Business-test diagnostics are artifact-only. Connector or job-log truncation,
# inability to display every failure, and changes in failure-group counts are not
# reasons to modify this workflow, its diagnostic producer, or its contract tests.
# Job logs may contain fixed control metadata and periodic progress heartbeats,
# but never failure lists, root-cause groups, tracebacks, or raw test-log tails.
# Modify this file only for action/runtime upgrades, security fixes, validation-scope
# changes, or a reproducible failure to generate, upload, download, or parse the artifact.

name: Reusable validation

on:
  workflow_call:
    inputs:
      revision:
        description: Exact repository revision to validate
        required: true
        type: string
      run_node_tests:
        description: Run WebView Node behavior tests
        required: false
        type: boolean
        default: false
      run_build_smoke:
        description: Build the executable and per-user installer
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  PYTHONUTF8: "1"
  PYTHONIOENCODING: utf-8
  PYTHONFAULTHANDLER: "1"

jobs:
  python311:
    name: Python 3.11 full suite
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Check out exact revision
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.revision }}
          clean: true
          show-progress: false
          persist-credentials: false

      - name: Capture tested revision
        id: revision
        shell: pwsh
        run: |
          $testedSha = (git rev-parse HEAD).Trim()
          if ($testedSha -ne "${{ inputs.revision }}") {
            throw "Checked out $testedSha instead of requested revision ${{ inputs.revision }}"
          }
          "sha=$testedSha" | Add-Content -LiteralPath $env:GITHUB_OUTPUT -Encoding UTF8
          "tested_sha=$testedSha" | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Encoding UTF8
          Write-Host "tested_sha=$testedSha"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        shell: pwsh
        run: python -m pip install --disable-pip-version-check -q -r requirements-dev.txt

      - name: Check test inventory
        id: inventory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "test-results" | Out-Null
          & python scripts/test_inventory.py --check *> "test-results/inventory.log"
          $inventoryExitCode = $LASTEXITCODE
          Get-Content -LiteralPath "test-results/inventory.log" |
            ForEach-Object { Write-Host $_ }
          exit $inventoryExitCode

      - name: Compile Python
        id: compile
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "test-results" | Out-Null
          & python -m compileall -q worktrace scripts/pytest_diagnostics.py scripts/pytest_log_to_junit.py scripts/run_pytest_ci.py *> "test-results/compile.log"
          $compileExitCode = $LASTEXITCODE
          Write-Host "compile exit code: $compileExitCode"
          if ($compileExitCode -ne 0) {
            Get-Content -LiteralPath "test-results/compile.log" -Tail 120 |
              ForEach-Object { Write-Host $_ }
          }
          exit $compileExitCode

      - name: Run Python tests
        id: pytest
        shell: pwsh
        run: |
          $utf8 = [System.Text.UTF8Encoding]::new($false)
          [Console]::InputEncoding = $utf8
          [Console]::OutputEncoding = $utf8
          $OutputEncoding = $utf8
          $PSNativeCommandUseErrorActionPreference = $false

          New-Item -ItemType Directory -Force -Path "test-results" | Out-Null
          $pytestStartedAt = Get-Date
          & python scripts/run_pytest_ci.py `
            --log "test-results/pytest.log" `
            --progress "test-results/pytest-progress.json" `
            --heartbeat-seconds 60 `
            -- `
            -q -ra --tb=short --color=no --cache-clear `
            --timeout=90 --timeout-method=thread `
            --durations=25 --durations-min=0.2 `
            --junitxml="test-results/pytest-junit.xml"
          $pytestExitCode = $LASTEXITCODE
          $pytestElapsedSeconds = ((Get-Date) - $pytestStartedAt).TotalSeconds

          Write-Host "pytest_exit_code=$pytestExitCode"
          Write-Host ("pytest_elapsed_seconds={0:N2}" -f $pytestElapsedSeconds)
          if ($pytestExitCode -ne 0) {
            Write-Host "pytest_failed=true diagnostics_source=workflow_artifact"
          }
          exit $pytestExitCode

      - name: Generate diagnostic artifact
        if: failure()
        continue-on-error: true
        shell: pwsh
        run: |
          $artifactName = "validation-diagnostics-${{ inputs.revision }}"
          if ("${{ steps.inventory.outcome }}" -eq "failure") {
            & python scripts/pytest_diagnostics.py `
              --stage inventory `
              --log "test-results/inventory.log" `
              --output-dir "test-results" `
              --revision "${{ inputs.revision }}" `
              --artifact-name $artifactName
          }
          elseif ("${{ steps.compile.outcome }}" -eq "failure") {
            & python scripts/pytest_diagnostics.py `
              --stage compile `
              --log "test-results/compile.log" `
              --output-dir "test-results" `
              --revision "${{ inputs.revision }}" `
              --artifact-name $artifactName
          }
          elseif ("${{ steps.pytest.outcome }}" -eq "failure") {
            if (-not (Test-Path -LiteralPath "test-results/pytest-junit.xml")) {
              Write-Host "junit_recovery=required"
              & python scripts/pytest_log_to_junit.py `
                --log "test-results/pytest.log" `
                --output "test-results/pytest-junit.xml" `
                --timeout-seconds 90
              if ($LASTEXITCODE -ne 0) {
                Write-Warning "Partial JUnit recovery failed; diagnostics will use the artifact log fallback"
              }
            }
            & python scripts/pytest_diagnostics.py `
              --stage pytest `
              --junit "test-results/pytest-junit.xml" `
              --log "test-results/pytest.log" `
              --output-dir "test-results" `
              --revision "${{ inputs.revision }}" `
              --artifact-name $artifactName
          }

          if (-not (Test-Path -LiteralPath "test-results/diagnostics.json")) {
            throw "Canonical diagnostics.json was not generated"
          }

      - name: Upload diagnostic artifact
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: validation-diagnostics-${{ inputs.revision }}
          path: test-results/
          if-no-files-found: error
          retention-days: 3

  node:
    name: WebView Node behavior tests
    if: inputs.run_node_tests
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Check out exact revision
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.revision }}
          clean: true
          show-progress: false
          persist-credentials: false

      - name: Capture tested revision
        shell: pwsh
        run: |
          $testedSha = (git rev-parse HEAD).Trim()
          if ($testedSha -ne "${{ inputs.revision }}") {
            throw "Checked out $testedSha instead of requested revision ${{ inputs.revision }}"
          }
          "tested_sha=$testedSha" | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Encoding UTF8
          Write-Host "tested_sha=$testedSha"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Run WebView Node tests
        run: node --test tests/webview/*.test.js

  build:
    name: Windows package smoke
    if: inputs.run_build_smoke
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out exact revision
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.revision }}
          clean: true
          show-progress: false
          persist-credentials: false

      - name: Capture tested revision
        shell: pwsh
        run: |
          $testedSha = (git rev-parse HEAD).Trim()
          if ($testedSha -ne "${{ inputs.revision }}") {
            throw "Checked out $testedSha instead of requested revision ${{ inputs.revision }}"
          }
          "tested_sha=$testedSha" | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Encoding UTF8
          Write-Host "tested_sha=$testedSha"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -q -r requirements-dev.txt

      - name: Build single-file exe
        run: python -m PyInstaller --noconfirm --clean WorkTrace.spec

      - name: Verify single-file exe
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath "dist\WorkTrace.exe")) {
            throw "dist\WorkTrace.exe was not generated"
          }

      - name: Build per-user installer
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts\build_windows_installer.ps1

      - name: Verify installer
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath "dist\WorkTrace-Setup.exe")) {
            throw "dist\WorkTrace-Setup.exe was not generated"
          }

      - name: Upload release smoke artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v6
        with:
          name: worktrace-windows-smoke
          path: |
            dist/WorkTrace.exe
            dist/WorkTrace-Setup.exe
          if-no-files-found: error
          retention-days: 1
