name: Apply architecture hardening on hosted runner

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: apply-hardening-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/worktrace-architecture-hardening
          clean: true
      - name: Apply embedded completion patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from textwrap import dedent

          workflow = Path('.github/workflows/diagnose-hardening.yml').read_text(encoding='utf-8')
          start_marker = "          @'\n"
          end_marker = "\n          '@ | Set-Content -LiteralPath apply_hardening.py -Encoding UTF8"
          if start_marker not in workflow or end_marker not in workflow:
              raise SystemExit('embedded hardening patch not found')
          source = workflow.split(start_marker, 1)[1].split(end_marker, 1)[0]
          source = dedent(source)
          exec(compile(source, 'apply_hardening.py', 'exec'), {})
          PY
          rm -f .github/workflows/apply-hardening-linux.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Complete architecture hardening boundaries"
          git push origin HEAD:agent/worktrace-architecture-hardening
