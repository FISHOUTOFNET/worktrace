name: Execute architecture source transforms

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/execute-architecture-source-transforms.yml

permissions:
  contents: write

jobs:
  transform:
    if: github.event.pull_request.head.ref == 'agent/canonical-architecture-consolidation'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          clean: true
          show-progress: false

      - name: Execute deterministic transforms
        shell: python {0}
        run: |
          from pathlib import Path
          import subprocess
          import traceback

          diagnostic = Path('diagnostics/architecture-transform-error.txt')
          try:
              source_path = Path('.github/workflows/apply-architecture-source-transforms.yml')
              lines = source_path.read_text(encoding='utf-8').splitlines()
              step = lines.index('      - name: Apply deterministic source transforms')
              run = lines.index('        run: |', step)
              end = lines.index('      - name: Commit transformed sources', run)
              script_lines = []
              in_triple = False
              for raw in lines[run + 1:end]:
                  if in_triple:
                      line = raw
                  elif raw.startswith('          '):
                      line = raw[10:]
                  elif not raw:
                      line = ''
                  else:
                      raise RuntimeError(f'unexpected Python indentation outside string: {raw!r}')
                  script_lines.append(line)
                  if line.count('"""') % 2 == 1:
                      in_triple = not in_triple
              if in_triple:
                  raise RuntimeError('unterminated triple-quoted transform string')
              script = '\n'.join(script_lines) + '\n'
              compile(script, str(source_path), 'exec')
              exec(compile(script, str(source_path), 'exec'), {'__name__': '__main__'})
              diagnostic.unlink(missing_ok=True)
              Path('diagnostics/architecture-transform-preview.txt').unlink(missing_ok=True)
          except Exception:
              failure = traceback.format_exc()
              subprocess.run(['git', 'reset', '--hard', 'HEAD'], check=True)
              diagnostic.parent.mkdir(exist_ok=True)
              diagnostic.write_text(failure, encoding='utf-8')
          Path('.github/workflows/execute-architecture-source-transforms.yml').unlink(missing_ok=True)

      - name: Commit transform result
        shell: bash
        run: |
          git config user.name "worktrace-architecture-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git status --short
          git commit -m "Consolidate source ownership boundaries [skip ci]"
          git pull --rebase origin "${{ github.event.pull_request.head.ref }}"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
