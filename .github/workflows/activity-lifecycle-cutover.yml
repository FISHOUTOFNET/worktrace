name: Activity lifecycle cutover

on:
  push:
    branches:
      - agent/canonical-architecture-consolidation
    paths:
      - .github/workflows/activity-lifecycle-cutover.yml

permissions:
  contents: write

jobs:
  cutover:
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 30
    steps:
      - name: Check out exact cutover revision
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          clean: true
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Remove legacy activity lifecycle CRUD
        run: python scripts/remove_activity_service_legacy_crud.py

      - name: Compile Python
        run: python -m compileall -q worktrace tests

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -q -r requirements.txt

      - name: Validate cutover
        shell: pwsh
        run: |
          $utf8 = [System.Text.UTF8Encoding]::new($false)
          [Console]::InputEncoding = $utf8
          [Console]::OutputEncoding = $utf8
          $OutputEncoding = $utf8
          $PSNativeCommandUseErrorActionPreference = $false

          & python -m pytest -q -ra --tb=short --color=no --cache-clear
          exit $LASTEXITCODE

      - name: Commit validated cutover
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm scripts/remove_activity_service_legacy_crud.py
          git rm .github/workflows/activity-lifecycle-cutover.yml
          git add worktrace/services/activity_service.py tests/test_activity_fixture_migration_contract.py
          git commit -m "Remove legacy activity lifecycle CRUD [skip ci]"
          git push origin "HEAD:agent/canonical-architecture-consolidation"
