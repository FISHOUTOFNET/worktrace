name: Cleanup page owner references

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/cleanup-page-owner-references.yml

permissions:
  contents: write

jobs:
  cleanup:
    if: github.event.pull_request.head.ref == 'agent/canonical-architecture-consolidation'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          clean: true
          show-progress: false
      - run: python scripts/cleanup_page_owner_references.py
      - shell: bash
        run: |
          git config user.name "worktrace-architecture-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git status --short
          git commit -m "Remove obsolete page owner references [skip ci]"
          git pull --rebase origin "${{ github.event.pull_request.head.ref }}"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
