name: Architecture hardening diagnostics

on:
  push:
    branches: [agent/worktrace-architecture-hardening]

permissions:
  contents: write

concurrency:
  group: architecture-hardening-diagnostics
  cancel-in-progress: false

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    name: Capture full pytest diagnostics
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 35
    steps:
      - name: Check out repair branch
        uses: actions/checkout@v4
        with:
          ref: agent/worktrace-architecture-hardening
          clean: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          check-latest: false

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --disable-pip-version-check -q -r requirements.txt

      - name: Run full Python suite and capture JUnit
        id: pytest
        shell: pwsh
        continue-on-error: true
        run: |
          New-Item -ItemType Directory -Force -Path test-results | Out-Null
          & python -m pytest -q -ra --tb=short --maxfail=50 --cache-clear --junitxml="test-results/pytest-junit.xml" 2>&1 |
            Tee-Object -FilePath "test-results/pytest.log"
          "exit_code=$LASTEXITCODE" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Write stable diagnostic report
        shell: pwsh
        run: |
          $reportPath = "diagnostics/pytest-hardening-latest.txt"
          New-Item -ItemType Directory -Force -Path diagnostics | Out-Null
          $lines = New-Object System.Collections.Generic.List[string]
          $lines.Add("head=$env:GITHUB_SHA")
          $lines.Add("run_id=$env:GITHUB_RUN_ID")
          $lines.Add("pytest_exit_code=${{ steps.pytest.outputs.exit_code }}")
          $lines.Add("")
          $junitPath = "test-results/pytest-junit.xml"
          if (Test-Path -LiteralPath $junitPath) {
            [xml]$junit = Get-Content -LiteralPath $junitPath -Raw
            $allCases = @($junit.SelectNodes("//testcase"))
            $failures = @($junit.SelectNodes("//testcase[failure or error]"))
            $skipped = @($junit.SelectNodes("//testcase[skipped]"))
            $lines.Add("total=$($allCases.Count) failures=$($failures.Count) skipped=$($skipped.Count)")
            $lines.Add("")
            $index = 0
            foreach ($case in $failures) {
              $index += 1
              $problem = $case.SelectSingleNode("failure | error")
              $className = $case.GetAttribute("classname")
              $testName = $case.GetAttribute("name")
              $lines.Add("[$index] $className::$testName")
              $lines.Add($problem.GetAttribute("message"))
              $traceback = [string]$problem.InnerText
              if ($traceback.Length -gt 6000) {
                $traceback = $traceback.Substring(0, 6000) + "`n... truncated ..."
              }
              $lines.Add($traceback)
              $lines.Add("")
            }
          }
          else {
            $lines.Add("JUnit report missing")
          }
          $lines.Add("=== PYTEST LOG TAIL ===")
          if (Test-Path -LiteralPath "test-results/pytest.log") {
            Get-Content -LiteralPath "test-results/pytest.log" -Tail 300 | ForEach-Object { $lines.Add($_) }
          }
          $lines | Set-Content -LiteralPath $reportPath -Encoding UTF8

      - name: Commit diagnostics without starting another CI run
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add diagnostics/pytest-hardening-latest.txt
          if (git diff --cached --quiet) {
            Write-Host "No diagnostic change"
            exit 0
          }
          git commit -m "Capture hardening pytest diagnostics [skip ci]"
          git push origin HEAD:agent/worktrace-architecture-hardening
