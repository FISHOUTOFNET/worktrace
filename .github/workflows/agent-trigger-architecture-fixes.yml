name: Trigger architecture repair stages

on:
  pull_request:
    paths:
      - .github/workflows/agent-trigger-architecture-fixes.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/canonical-architecture-consolidation
          fetch-depth: 0
          clean: true
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Configure repository
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge --no-ff origin/main -m "Sync main validation baseline [skip ci]"
      - name: Extract and apply staged patch
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          try {
            $source = Get-Content -LiteralPath .github/workflows/agent-apply-architecture-fixes.yml -Raw
            $match = [regex]::Match($source, "(?s)          @'\r?\n(.*?)\r?\n          '@ \| Set-Content -LiteralPath \.agent_apply\.py -Encoding UTF8")
            if (-not $match.Success) { throw "Embedded architecture patch was not found" }
            [string[]]$lines = $match.Groups[1].Value -split "\r?\n" | ForEach-Object {
              if ($_.StartsWith("          ")) { $_.Substring(10) } else { $_ }
            }

            $fragileStart = -1
            $fragileEnd = -1
            for ($i = 0; $i -lt $lines.Length; $i++) {
              if ($lines[$i].Trim() -ne "replace_once(") { continue }
              $windowEnd = [Math]::Min($lines.Length - 1, $i + 30)
              $window = ($lines[$i..$windowEnd] -join "`n")
              if ($window.Contains("'worktrace/webview_ui/js/init.js'") -and $window.Contains("timeline-hide-session")) {
                $fragileStart = $i
                for ($j = $i + 1; $j -lt $lines.Length; $j++) {
                  if ($lines[$j] -eq ")") { $fragileEnd = $j; break }
                }
                break
              }
            }
            if ($fragileStart -lt 0 -or $fragileEnd -lt $fragileStart) {
              throw "Fragile timeline action replacement was not found"
            }
            $prefix = if ($fragileStart -gt 0) { $lines[0..($fragileStart - 1)] } else { @() }
            $suffix = if ($fragileEnd + 1 -lt $lines.Length) { $lines[($fragileEnd + 1)..($lines.Length - 1)] } else { @() }
            [string[]]$lines = @($prefix + "# Timeline action keys are patched after the structural script." + $suffix)
            [System.IO.File]::WriteAllLines((Join-Path $PWD ".agent_apply.py"), $lines, [System.Text.UTF8Encoding]::new($false))

            python .agent_apply.py *> agent-apply.log
            $applyExitCode = $LASTEXITCODE
            if ($applyExitCode -ne 0) { throw "architecture patch exited with code $applyExitCode" }

            $initPath = "worktrace/webview_ui/js/init.js"
            $init = Get-Content -LiteralPath $initPath -Raw
            $mappings = @(
              @('["timeline-hide-session", "hide_timeline_session"]', '["timeline-hide-session", "hide"]'),
              @('["timeline-merge-previous", "merge_timeline_session", "previous"]', '["timeline-merge-previous", "merge", "previous"]'),
              @('["timeline-merge-next", "merge_timeline_session", "next"]', '["timeline-merge-next", "merge", "next"]'),
              @('["timeline-split-session", "split_timeline_session"]', '["timeline-split-session", "split"]'),
              @('["timeline-copy-session", "copy_timeline_session"]', '["timeline-copy-session", "copy"]')
            )
            foreach ($mapping in $mappings) {
              $count = ([regex]::Matches($init, [regex]::Escape($mapping[0]))).Count
              if ($count -ne 1) { throw "Expected one timeline action mapping, found $count: $($mapping[0])" }
              $init = $init.Replace($mapping[0], $mapping[1])
            }
            [System.IO.File]::WriteAllText((Join-Path $PWD $initPath), $init, [System.Text.UTF8Encoding]::new($false))
            Remove-Item .agent_apply.py, agent-apply.log
          }
          catch {
            New-Item -ItemType Directory -Force -Path diagnostics | Out-Null
            @(
              $_.Exception.ToString(),
              "",
              $(if (Test-Path agent-apply.log) { Get-Content agent-apply.log -Raw } else { "" })
            ) | Set-Content -LiteralPath diagnostics/agent-apply-latest.txt -Encoding UTF8
            Get-Content -LiteralPath diagnostics/agent-apply-latest.txt -Tail 160 | ForEach-Object { Write-Host $_ }
            git checkout -B agent/worktrace-agent-diagnostics
            git add diagnostics/agent-apply-latest.txt
            git commit -m "Capture architecture repair diagnostics"
            git push --force origin HEAD:agent/worktrace-agent-diagnostics
            exit 1
          }
      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -q -r requirements.txt
      - name: Validate phase
        shell: pwsh
        run: |
          python -m compileall -q worktrace
          python -m pytest -q tests/test_page_read_context_contract.py tests/test_bridge_capability_boundary.py tests/test_canonical_owner_graph_contract.py tests/test_architecture_consolidation_contract.py tests/test_webview_bridge.py tests/test_timeline_api_editing.py
          node --test tests/webview/*.test.js
      - name: Commit and push
        shell: pwsh
        run: |
          git rm .github/workflows/agent-apply-architecture-fixes.yml .github/workflows/agent-trigger-architecture-fixes.yml
          git add -A
          git commit -m "Complete canonical runtime and fixed bridge cutover"
          git push origin HEAD:agent/canonical-architecture-consolidation
