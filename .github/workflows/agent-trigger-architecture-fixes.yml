name: Trigger architecture repair stages

on:
  pull_request:
    paths:
      - .github/workflows/agent-trigger-architecture-fixes.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/canonical-architecture-consolidation
          fetch-depth: 0
          clean: true
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Configure repository
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge --no-ff origin/main -m "Sync main validation baseline [skip ci]"
      - name: Apply deterministic migration
        id: migrate
        shell: pwsh
        continue-on-error: true
        run: |
          python .github/agent_apply_runtime_bridge.py *> agent-apply.log
          if ($LASTEXITCODE -eq 0) { python .github/agent_fix_runtime_bridge_tests.py *>> agent-apply.log }
          $code = $LASTEXITCODE
          Get-Content -LiteralPath agent-apply.log -Tail 200 | ForEach-Object { Write-Host $_ }
          if ($code -ne 0) { exit $code }
      - name: Capture migration diagnostics
        if: steps.migrate.outcome == 'failure'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path diagnostics | Out-Null
          @(
            "kind=migration",
            "run_id=$env:GITHUB_RUN_ID",
            "head=$env:GITHUB_SHA",
            "captured_at=$([DateTime]::UtcNow.ToString('o'))",
            "",
            $(Get-Content agent-apply.log -Raw)
          ) | Set-Content -LiteralPath diagnostics/agent-apply-latest.txt -Encoding UTF8
          git checkout -B agent/worktrace-agent-diagnostics
          git add diagnostics/agent-apply-latest.txt
          git commit -m "Capture architecture repair diagnostics"
          git push --force origin HEAD:agent/worktrace-agent-diagnostics
          exit 1
      - name: Install dependencies
        if: steps.migrate.outcome == 'success'
        run: python -m pip install --disable-pip-version-check -q -r requirements.txt
      - name: Validate phase
        id: validate
        if: steps.migrate.outcome == 'success'
        continue-on-error: true
        shell: pwsh
        run: |
          "== compileall ==" | Set-Content validation.log
          python -m compileall -q worktrace *>> validation.log
          if ($LASTEXITCODE -ne 0) { Get-Content validation.log -Tail 240; exit 11 }
          "`n== pytest ==" | Add-Content validation.log
          python -m pytest -q tests/test_page_read_context_contract.py tests/test_bridge_capability_boundary.py tests/test_canonical_owner_graph_contract.py tests/test_architecture_consolidation_contract.py tests/test_webview_bridge.py tests/test_timeline_api_editing.py *>> validation.log
          if ($LASTEXITCODE -ne 0) { Get-Content validation.log -Tail 240; exit 12 }
          "`n== node ==" | Add-Content validation.log
          node --test tests/webview/*.test.js *>> validation.log
          if ($LASTEXITCODE -ne 0) { Get-Content validation.log -Tail 240; exit 13 }
          Get-Content validation.log -Tail 240
      - name: Capture validation diagnostics
        if: steps.migrate.outcome == 'success' && steps.validate.outcome == 'failure'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path diagnostics | Out-Null
          @(
            "kind=validation",
            "run_id=$env:GITHUB_RUN_ID",
            "head=$env:GITHUB_SHA",
            "captured_at=$([DateTime]::UtcNow.ToString('o'))",
            "",
            $(Get-Content validation.log -Raw)
          ) | Set-Content -LiteralPath diagnostics/agent-apply-latest.txt -Encoding UTF8
          git checkout -B agent/worktrace-agent-diagnostics
          git add diagnostics/agent-apply-latest.txt
          git commit -m "Capture architecture validation diagnostics"
          git push --force origin HEAD:agent/worktrace-agent-diagnostics
          exit 1
      - name: Commit and push
        if: steps.migrate.outcome == 'success' && steps.validate.outcome == 'success'
        shell: pwsh
        run: |
          git rm .github/workflows/agent-apply-architecture-fixes.yml .github/workflows/agent-trigger-architecture-fixes.yml .github/agent_apply_runtime_bridge.py .github/agent_fix_runtime_bridge_tests.py
          git add -A
          git commit -m "Complete canonical runtime and fixed bridge cutover"
          git push origin HEAD:agent/canonical-architecture-consolidation
