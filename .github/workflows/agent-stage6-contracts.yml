name: Apply stage 6 architecture contracts

on:
  pull_request:
    paths:
      - .github/workflows/agent-stage6-contracts.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/canonical-architecture-consolidation
          fetch-depth: 0
          clean: true
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Configure repository
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge --no-ff origin/main -m "Sync main before architecture contracts [skip ci]"
      - name: Apply contract migration
        id: migrate
        continue-on-error: true
        shell: pwsh
        run: |
          python .github/agent_apply_stage6_contracts.py *> stage.log
          $code = $LASTEXITCODE
          Get-Content stage.log -Tail 260
          if ($code -ne 0) { exit $code }
      - name: Install dependencies
        if: steps.migrate.outcome == 'success'
        run: python -m pip install --disable-pip-version-check -q -r requirements.txt
      - name: Validate stage 6
        id: validate
        if: steps.migrate.outcome == 'success'
        continue-on-error: true
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force test-results | Out-Null
          "== inventory ==" | Set-Content validation.log
          python scripts/test_inventory.py --check *>> validation.log
          if ($LASTEXITCODE -ne 0) { Get-Content validation.log -Tail 360; exit 10 }
          "`n== compile ==" | Add-Content validation.log
          python -m compileall -q worktrace scripts *>> validation.log
          if ($LASTEXITCODE -ne 0) { Get-Content validation.log -Tail 360; exit 11 }
          "`n== pytest ==" | Add-Content validation.log
          python -m pytest -q -ra --tb=short --color=no --cache-clear --junitxml=test-results/pytest-junit.xml *>> validation.log
          if ($LASTEXITCODE -ne 0) { Get-Content validation.log -Tail 420; exit 12 }
          "`n== node ==" | Add-Content validation.log
          node --test tests/webview/*.test.js *>> validation.log
          if ($LASTEXITCODE -ne 0) { Get-Content validation.log -Tail 420; exit 13 }
          Get-Content validation.log -Tail 420
      - name: Capture diagnostics
        if: steps.migrate.outcome == 'failure' || steps.validate.outcome == 'failure'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force diagnostics | Out-Null
          @(
            "kind=stage6_contracts",
            "run_id=$env:GITHUB_RUN_ID",
            "actual_head=$(git rev-parse HEAD)",
            "captured_at=$([DateTime]::UtcNow.ToString('o'))",
            "migration=${{ steps.migrate.outcome }}",
            "validation=${{ steps.validate.outcome }}",
            "",
            $(if (Test-Path stage.log) { Get-Content stage.log -Raw } else { "" }),
            "",
            $(if (Test-Path validation.log) { Get-Content validation.log -Raw } else { "" })
          ) | Set-Content diagnostics/agent-stage6-contracts-latest.txt -Encoding UTF8
          git checkout -B agent/worktrace-agent-diagnostics
          git add diagnostics/agent-stage6-contracts-latest.txt
          git commit -m "Capture stage 6 contract diagnostics"
          git push --force origin HEAD:agent/worktrace-agent-diagnostics
          exit 1
      - name: Commit stage
        if: steps.migrate.outcome == 'success' && steps.validate.outcome == 'success'
        shell: pwsh
        run: |
          git rm .github/agent_apply_stage6_contracts.py .github/workflows/agent-stage6-contracts.yml
          git add -A
          git commit -m "Close architecture contracts and repository hygiene"
          git push origin HEAD:agent/canonical-architecture-consolidation
