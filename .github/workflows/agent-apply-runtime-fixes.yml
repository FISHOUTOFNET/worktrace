name: Agent apply runtime fixes

on:
  push:
    branches: [agent/runtime-projection-consistency-hardening]

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[agent-applied]') }}
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/runtime-projection-consistency-hardening
          clean: true
          fetch-depth: 0
      - name: Apply architecture fixes
        shell: pwsh
        run: |
          @'
          from pathlib import Path
          import re

          def read(path):
              return Path(path).read_text(encoding='utf-8')

          def write(path, text):
              Path(path).parent.mkdir(parents=True, exist_ok=True)
              Path(path).write_text(text, encoding='utf-8', newline='\n')

          def replace_once(path, old, new):
              text = read(path)
              if old not in text:
                  raise RuntimeError(f'pattern not found in {path}: {old[:120]!r}')
              write(path, text.replace(old, new, 1))

          # Central privacy policy: all sensitive long-lived runtime components use one gate.
          write('worktrace/services/privacy_gate_service.py', '''from __future__ import annotations

from .settings_service import get_bool_setting, get_setting, set_setting

PRIVACY_NOTICE_VERSION = "1"
_ACCEPTED_VERSION_KEY = "accepted_privacy_notice_version"
_LEGACY_ACCEPTED_KEY = "first_run_notice_accepted"


def accepted_notice_version() -> str:
    value = str(get_setting(_ACCEPTED_VERSION_KEY, "") or "")
    if value:
        return value
    if get_bool_setting(_LEGACY_ACCEPTED_KEY, False):
        return PRIVACY_NOTICE_VERSION
    return ""


def is_privacy_notice_accepted() -> bool:
    return accepted_notice_version() == PRIVACY_NOTICE_VERSION


def accept_current_privacy_notice() -> None:
    set_setting(_ACCEPTED_VERSION_KEY, PRIVACY_NOTICE_VERSION)
    set_setting(_LEGACY_ACCEPTED_KEY, "true")


def restore_installation_consent(version: str) -> None:
    if str(version or "") == PRIVACY_NOTICE_VERSION:
        accept_current_privacy_notice()


def is_sensitive_runtime_allowed() -> bool:
    return is_privacy_notice_accepted()


def require_sensitive_runtime_allowed() -> None:
    if not is_sensitive_runtime_allowed():
        raise PermissionError("privacy_notice_required")
''')

          # Runtime-level fail-closed gates.
          replace_once('worktrace/runtime/app_runtime.py',
              'from ..services import activity_lifecycle_service, folder_index_service, recovery_service\n',
              'from ..services import activity_lifecycle_service, folder_index_service, recovery_service\nfrom ..services.privacy_gate_service import is_sensitive_runtime_allowed\n')
          replace_once('worktrace/runtime/app_runtime.py',
              '            if not self.owns_collector or self._shutdown or self.stop_event.is_set():\n                return False\n',
              '            if (\n                not self.owns_collector\n                or self._shutdown\n                or self.stop_event.is_set()\n                or not is_sensitive_runtime_allowed()\n            ):\n                return False\n')
          replace_once('worktrace/runtime/app_runtime.py',
              '            if self._shutdown or self.stop_event.is_set():\n                return {"ok": False, "error": "runtime_stopping"}\n',
              '            if self._shutdown or self.stop_event.is_set():\n                return {"ok": False, "error": "runtime_stopping"}\n            if not is_sensitive_runtime_allowed():\n                self.set_clipboard_capture_enabled(False)\n                return {"ok": False, "error": "privacy_notice_required"}\n')
          replace_once('worktrace/runtime/app_runtime.py',
              '    def set_clipboard_capture_enabled(self, enabled: bool) -> None:\n        setter = getattr(self._adapter, "set_clipboard_capture_enabled", None)\n        if setter is not None:\n            setter(bool(enabled))\n',
              '    def set_clipboard_capture_enabled(self, enabled: bool) -> None:\n        effective = bool(enabled) and is_sensitive_runtime_allowed()\n        setter = getattr(self._adapter, "set_clipboard_capture_enabled", None)\n        if setter is not None:\n            setter(effective)\n        if enabled and not effective:\n            raise PermissionError("privacy_notice_required")\n')

          # App facade uses the same gate instead of duplicating settings semantics.
          replace_once('worktrace/api/app_api.py',
              'from ..services.runtime_activity_state_service import record_runtime_boundary\n',
              'from ..services.runtime_activity_state_service import record_runtime_boundary\nfrom ..services.privacy_gate_service import is_sensitive_runtime_allowed\n')
          replace_once('worktrace/api/app_api.py',
              '        notice_accepted = settings_api.first_run_notice_accepted()\n',
              '        notice_accepted = is_sensitive_runtime_allowed()\n')
          replace_once('worktrace/api/app_api.py',
              'def set_clipboard_capture_enabled(enabled: bool) -> None:\n    """Apply a clipboard privacy toggle immediately to the live adapter."""\n    if _runtime is not None:\n        _runtime.set_clipboard_capture_enabled(bool(enabled))\n',
              'def set_clipboard_capture_enabled(enabled: bool) -> None:\n    """Apply a clipboard privacy toggle immediately to the live adapter."""\n    if enabled and not is_sensitive_runtime_allowed():\n        raise PermissionError("privacy_notice_required")\n    if _runtime is not None:\n        _runtime.set_clipboard_capture_enabled(bool(enabled))\n')

          # Folder index checks consent on every loop, including after DB replacement.
          replace_once('worktrace/services/folder_index_service.py',
              '            from .secure_backup_service import is_secure_import_in_progress\n\n            if is_secure_import_in_progress():\n',
              '            from .secure_backup_service import is_secure_import_in_progress\n            from .privacy_gate_service import is_sensitive_runtime_allowed\n\n            if is_secure_import_in_progress() or not is_sensitive_runtime_allowed():\n')
          replace_once('worktrace/services/folder_index_service.py',
              '                if is_secure_import_in_progress():\n                    break\n',
              '                if is_secure_import_in_progress() or not is_sensitive_runtime_allowed():\n                    break\n')
          replace_once('worktrace/services/folder_index_service.py',
              '                    if stop_event.is_set() or is_secure_import_in_progress():\n                        break\n',
              '                    if (\n                        stop_event.is_set()\n                        or is_secure_import_in_progress()\n                        or not is_sensitive_runtime_allowed()\n                    ):\n                        break\n')

          # Settings facade: versioned installation consent survives DB replacement.
          replace_once('worktrace/api/settings_api.py',
              'from . import backup_api, view_model_api\n',
              'from . import backup_api, view_model_api\nfrom ..services import privacy_gate_service\n')
          replace_once('worktrace/api/settings_api.py',
              'def first_run_notice_accepted() -> bool:\n    return get_bool_setting("first_run_notice_accepted", False)\n\n\ndef accept_first_run_notice() -> None:\n    set_setting("first_run_notice_accepted", "true")\n',
              'def first_run_notice_accepted() -> bool:\n    return privacy_gate_service.is_privacy_notice_accepted()\n\n\ndef accept_first_run_notice() -> None:\n    privacy_gate_service.accept_current_privacy_notice()\n')
          replace_once('worktrace/api/settings_api.py',
              '    try:\n        result = backup_api.import_encrypted_backup(\n            input_path, passphrase, mode="replace"\n        )\n',
              '    accepted_version = privacy_gate_service.accepted_notice_version()\n    try:\n        result = backup_api.import_encrypted_backup(\n            input_path, passphrase, mode="replace"\n        )\n        clear_settings_cache()\n        privacy_gate_service.restore_installation_consent(accepted_version)\n        set_setting("user_paused", "true")\n        set_setting("clipboard_capture_enabled", "false")\n')
          replace_once('worktrace/api/settings_api.py',
              '    try:\n        export_service.clear_all_local_data(confirm=True)\n',
              '    accepted_version = privacy_gate_service.accepted_notice_version()\n    try:\n        export_service.clear_all_local_data(confirm=True)\n        clear_settings_cache()\n        privacy_gate_service.restore_installation_consent(accepted_version)\n        set_setting("user_paused", "true")\n        set_setting("clipboard_capture_enabled", "false")\n')

          # Bridge rejects an enable request before touching the runtime adapter.
          replace_once('worktrace/webview_ui/bridge_settings.py',
              '            previous = bool(settings_api.is_clipboard_capture_enabled())\n            app_api.set_clipboard_capture_enabled(enabled)\n',
              '            if enabled and not settings_api.first_run_notice_accepted():\n                return {"ok": False, "error": "请先确认隐私说明"}\n            previous = bool(settings_api.is_clipboard_capture_enabled())\n            app_api.set_clipboard_capture_enabled(enabled)\n')

          # Coalescing page refresh: an update observed during an in-flight refresh is never lost.
          replace_once('worktrace/webview_ui/js/init.js',
              '    function refreshCurrentPageData(state, options) {\n        if (App.activePageRefreshInFlight) {\n            return Promise.resolve();\n        }\n        App.activePageRefreshInFlight = true;\n',
              '    function refreshCurrentPageData(state, options) {\n        if (App.activePageRefreshInFlight) {\n            App.pendingPageRefresh = { state: state || null, options: options || null };\n            return App.activePageRefreshPromise || Promise.resolve();\n        }\n        App.activePageRefreshInFlight = true;\n        App.pendingPageRefresh = null;\n')
          replace_once('worktrace/webview_ui/js/init.js',
              '        return statePromise.then(function (acceptedState) {\n',
              '        var refreshPromise = statePromise.then(function (acceptedState) {\n')
          replace_once('worktrace/webview_ui/js/init.js',
              '            App.activePageRefreshInFlight = false;\n            App.lastFullRefreshAtEpochMs = Date.now();\n',
              '            App.activePageRefreshInFlight = false;\n            App.activePageRefreshPromise = null;\n            App.lastFullRefreshAtEpochMs = Date.now();\n')
          replace_once('worktrace/webview_ui/js/init.js',
              '            if (!anyError) {\n                App.clearError();\n            }\n        }).catch(function (err) {\n            App.activePageRefreshInFlight = false;\n            throw err;\n        });\n',
              '            if (!anyError) {\n                App.clearError();\n            }\n            var pending = App.pendingPageRefresh;\n            App.pendingPageRefresh = null;\n            if (pending) return refreshCurrentPageData(pending.state, pending.options);\n            return results;\n        }).catch(function (err) {\n            App.activePageRefreshInFlight = false;\n            App.activePageRefreshPromise = null;\n            var pending = App.pendingPageRefresh;\n            App.pendingPageRefresh = null;\n            if (pending) return refreshCurrentPageData(pending.state, pending.options);\n            throw err;\n        });\n        App.activePageRefreshPromise = refreshPromise;\n        return refreshPromise;\n')

          # Timeline detail request sharing: each current owner subscribes to the shared network promise.
          path = 'worktrace/webview_ui/js/timeline.js'
          text = read(path)
          old = '''        var requestKey = App.timelineRequestState.detailRequestKey(owner);\n        if (App.detailsInFlight[requestKey]) return App.detailsInFlight[requestKey];'''
          new = '''        var requestKey = App.timelineRequestState.detailRequestKey(owner);\n        var sharedRequest = App.detailsInFlight[requestKey];\n        if (sharedRequest) {\n            return sharedRequest.then(function (result) {\n                if (!App.timelineRequestState.isCurrentDetailsOwner(owner)) return null;\n                if (!result || result.ok === false) return null;\n                var data = App.handleResult(result, function (msg) {\n                    detailsHeader.textContent = "加载项目活动耗时失败";\n                    detailsList.innerHTML = '<div class="timeline-empty">' + App.escapeHtml(msg) + '</div>';\n                });\n                if (!data || !acceptTimelineDetailsPayload(data, date)) return null;\n                renderSessionDetails(data);\n                return data;\n            });\n        }'''
          if old not in text:
              raise RuntimeError('timeline shared-request pattern missing')
          text = text.replace(old, new, 1)
          old_call = '        var request = App.callBridge("get_timeline_session_activity_summary", projectionInstanceKey || "", date, revision).then(function (result) {'
          new_call = '        var networkRequest = App.callBridge("get_timeline_session_activity_summary", projectionInstanceKey || "", date, revision);\n        App.detailsInFlight[requestKey] = networkRequest;\n        var request = networkRequest.then(function (result) {'
          if old_call not in text:
              raise RuntimeError('timeline network pattern missing')
          text = text.replace(old_call, new_call, 1)
          text = text.replace('            if (App.detailsInFlight[requestKey] === request) delete App.detailsInFlight[requestKey];', '            if (App.detailsInFlight[requestKey] === networkRequest) delete App.detailsInFlight[requestKey];', 1)
          text = text.replace('        App.detailsInFlight[requestKey] = request;\n        return request;', '        return request;', 1)
          write(path, text)

          # Statistics is latest-wins, and export uses the last accepted range rather than mutable inputs.
          replace_once('worktrace/webview_ui/js/statistics.js',
              '        if (App.statisticsLoading) return;\n',
              '        // Latest request wins; an earlier response cannot render under newer inputs.\n')
          replace_once('worktrace/webview_ui/js/statistics.js',
              '            App.statisticsSnapshotRevision = (data.summary && data.summary.snapshot_revision) || "";\n            showStatistics(data.summary);\n',
              '            App.statisticsSnapshotRevision = (data.summary && (data.summary.export_revision || data.summary.snapshot_revision)) || "";\n            App.acceptedStatisticsRange = { dateFrom: dateFrom, dateTo: dateTo };\n            showStatistics(data.summary);\n')
          replace_once('worktrace/webview_ui/js/statistics.js',
              '        var fromEl = document.getElementById("statistics-date-from");\n        var toEl = document.getElementById("statistics-date-to");\n        var dateFrom = fromEl ? fromEl.value : "";\n        var dateTo = toEl ? toEl.value : "";\n',
              '        var acceptedRange = App.acceptedStatisticsRange || {};\n        var dateFrom = acceptedRange.dateFrom || "";\n        var dateTo = acceptedRange.dateTo || "";\n',
              )

          # Database replacement invalidates every outstanding frontend read generation.
          replace_once('worktrace/webview_ui/js/settings.js',
              '    function resetFrontendAfterLocalDataReplacement() {\n',
              '    function resetFrontendAfterLocalDataReplacement() {\n        App.dataEpoch = (App.dataEpoch || 0) + 1;\n        App.overviewRequestToken++;\n        App.recentRequestToken++;\n        App.timelineRequestToken++;\n        App.statisticsRequestToken++;\n        App.settingsRequestToken++;\n        App.rulesRequestToken++;\n        App.timelineEpoch = (App.timelineEpoch || 0) + 1;\n        App.selectionEpoch = (App.selectionEpoch || 0) + 1;\n        App.detailsOwner = null;\n        App.detailsInFlight = {};\n        App.activePageRefreshInFlight = false;\n        App.activePageRefreshPromise = null;\n        App.pendingPageRefresh = null;\n        App.lastRefreshState = null;\n        App.liveRuntime = null;\n        App._monotonicRenderState = {};\n        App.statisticsLoading = false;\n        App.rulesLoading = false;\n        App.projectsLoading = false;\n')

          # Documentation: backend capability does not imply shipping UI.
          doc = read('docs/current-state.md')
          marker = '## Project Rules Capability Matrix\n'
          if marker in doc and 'Backend/Internal capabilities intentionally not exposed' not in doc:
              doc = doc.replace(marker, marker + '\n> The items below describe backend/bridge capability, not the shipping UI surface.\n> Low-frequency rule lifecycle, impact-preview, and batch controls are intentionally\n> not exposed because they materially increase frontend state and cognitive complexity.\n\n### Backend/Internal capabilities intentionally not exposed\n', 1)
              write('docs/current-state.md', doc)

          # Remove the temporary workflow from the resulting commit.
          Path('.github/workflows/agent-apply-runtime-fixes.yml').unlink()
          '@ | Set-Content -LiteralPath apply_fixes.py -Encoding UTF8
          python apply_fixes.py
          python -m compileall worktrace
          git config user.name "openai-agent"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Harden runtime privacy and frontend request coordination [agent-applied]"
          git push origin HEAD:agent/runtime-projection-consistency-hardening
