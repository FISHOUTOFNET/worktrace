name: Apply architecture source transforms

on:
  push:
    branches:
      - agent/canonical-architecture-consolidation
    paths:
      - .github/workflows/apply-architecture-source-transforms.yml

permissions:
  contents: write

jobs:
  transform:
    if: contains(github.event.head_commit.message, 'Apply architecture source transforms')
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 10
    steps:
      - name: Check out transform commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          clean: true
          show-progress: false

      - name: Apply deterministic source transforms
        shell: python {0}
        run: |
          from pathlib import Path

          def read(path: str) -> str:
              return Path(path).read_text(encoding="utf-8")

          def write(path: str, value: str) -> None:
              Path(path).write_text(value, encoding="utf-8", newline="\n")

          def replace_once(path: str, old: str, new: str) -> None:
              text = read(path)
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"{path}: expected one match, found {count}: {old[:80]!r}")
              write(path, text.replace(old, new, 1))

          def replace_region(path: str, start_marker: str, end_marker: str, replacement: str) -> None:
              text = read(path)
              start = text.index(start_marker)
              end = text.index(end_marker, start) + len(end_marker)
              write(path, text[:start] + replacement + text[end:])

          timeline = "worktrace/webview_ui/js/timeline.js"
          replace_once(
              timeline,
              "    App.renderProjectSelect = renderProjectSelect;\n\n    function populateEditPanel(session) {",
              """    App.renderProjectSelect = renderProjectSelect;

    function canEditField(session, field) {
        return !!session && session.edit_disabled !== true && session[field] !== false;
    }

    function hasEditableFields(session) {
        return canEditField(session, \"can_edit_project\")
            || canEditField(session, \"can_edit_note\")
            || canEditField(session, \"can_edit_duration\");
    }

    function applyEditCapabilities(session) {
        var projectAllowed = canEditField(session, \"can_edit_project\");
        var noteAllowed = canEditField(session, \"can_edit_note\");
        var durationAllowed = canEditField(session, \"can_edit_duration\");
        var select = document.getElementById(\"edit-project-select\");
        var noteEl = document.getElementById(\"edit-note-text\");
        var durInput = document.getElementById(\"edit-duration-input\");
        var saveBtn = document.getElementById(\"edit-save-btn\");
        var cancelBtn = document.getElementById(\"edit-cancel-btn\");
        if (select) select.disabled = App.editSaving || !projectAllowed || !App.projectsCache;
        if (noteEl) noteEl.disabled = App.editSaving || !noteAllowed;
        if (durInput) durInput.disabled = App.editSaving || !durationAllowed;
        if (cancelBtn) cancelBtn.disabled = App.editSaving || !session;
        if (saveBtn) {
            var noteLength = noteEl ? noteEl.value.length : 0;
            saveBtn.disabled = App.editSaving
                || !hasEditableFields(session)
                || (noteAllowed && noteLength > 2000);
        }
    }
    App.applyTimelineEditCapabilities = applyEditCapabilities;

    function populateEditPanel(session) {""",
          )
          replace_once(
              timeline,
              "        select.disabled = false;\n",
              "        applyEditCapabilities(App.editingSession);\n",
          )
          replace_once(
              timeline,
              "            durInput.disabled = false;\n",
              "            durInput.disabled = !canEditField(session, \"can_edit_duration\");\n",
          )
          replace_once(
              timeline,
              "            noteEl.disabled = false;\n",
              "            noteEl.disabled = !canEditField(session, \"can_edit_note\");\n",
          )
          replace_once(
              timeline,
              "        if (saveBtn) saveBtn.disabled = false;\n",
              "        if (saveBtn) saveBtn.disabled = !hasEditableFields(session);\n",
          )
          replace_once(
              timeline,
              "        updateNoteCount();\n        showEditStatus(\"\", false);\n",
              "        updateNoteCount();\n        applyEditCapabilities(session);\n        showEditStatus(\"\", false);\n",
          )
          replace_region(
              timeline,
              "    function isEditDirty() {",
              "    App.isEditDirty = isEditDirty;",
              """    function isEditDirty() {
        if (!App.editingSession) return false;
        var session = App.editingSession;
        var noteEl = document.getElementById(\"edit-note-text\");
        var select = document.getElementById(\"edit-project-select\");
        var durInput = document.getElementById(\"edit-duration-input\");
        if (canEditField(session, \"can_edit_note\") && noteEl) {
            if (noteEl.value !== (session.session_note || \"\")) return true;
        }
        if (canEditField(session, \"can_edit_project\") && select && select.value) {
            if (select.value !== String(session.project_id || \"\")) return true;
        }
        if (canEditField(session, \"can_edit_duration\") && durInput) {
            var baselineSeconds = (session.adjusted_duration_seconds != null)
                ? session.adjusted_duration_seconds
                : session.duration_seconds;
            var baselineMin = Math.round((parseInt(baselineSeconds, 10) || 0) / 60);
            var baselineValue = isNaN(baselineMin) ? \"\" : String(baselineMin);
            if ((durInput.value || \"\").trim() !== baselineValue) return true;
        }
        return false;
    }
    App.isEditDirty = isEditDirty;""",
          )
          replace_region(
              timeline,
              "    function updateNoteCount() {",
              "    App.updateNoteCount = updateNoteCount;",
              """    function updateNoteCount() {
        var textarea = document.getElementById(\"edit-note-text\");
        var counter = document.getElementById(\"edit-note-count\");
        var status = document.getElementById(\"edit-status\");
        if (!textarea || !counter) return;
        var len = textarea.value.length;
        counter.textContent = len + \" / 2000\";
        counter.classList.toggle(\"over-limit\", len > 2000);
        if (len > 2000 && status) {
            status.textContent = \"备注不能超过 2000 个字符\";
            status.classList.add(\"error\");
        } else if (status && status.textContent === \"备注不能超过 2000 个字符\") {
            showEditStatus(\"\", false);
        }
        applyEditCapabilities(App.editingSession);
    }
    App.updateNoteCount = updateNoteCount;""",
          )
          replace_region(
              timeline,
              "    function setEditSaving(saving) {",
              "    App.setEditSaving = setEditSaving;",
              """    function setEditSaving(saving) {
        App.editSaving = saving;
        if (saving) {
            var saveBtn = document.getElementById(\"edit-save-btn\");
            var cancelBtn = document.getElementById(\"edit-cancel-btn\");
            var select = document.getElementById(\"edit-project-select\");
            var noteEl = document.getElementById(\"edit-note-text\");
            var durInput = document.getElementById(\"edit-duration-input\");
            if (saveBtn) saveBtn.disabled = true;
            if (cancelBtn) cancelBtn.disabled = true;
            if (select) select.disabled = true;
            if (noteEl) noteEl.disabled = true;
            if (durInput) durInput.disabled = true;
            return;
        }
        applyEditCapabilities(App.editingSession);
    }
    App.setEditSaving = setEditSaving;""",
          )
          replace_region(
              timeline,
              "    function saveEdit() {",
              "    App.saveEdit = saveEdit;",
              """    function saveEdit() {
        if (!App.editingSession || App.editSaving) return;
        var session = App.editingSession;
        var canProject = canEditField(session, \"can_edit_project\");
        var canNote = canEditField(session, \"can_edit_note\");
        var canDuration = canEditField(session, \"can_edit_duration\");
        if (!canProject && !canNote && !canDuration) {
            showEditStatus(session.disable_reason || \"当前时段不可编辑\", true);
            return;
        }
        var select = document.getElementById(\"edit-project-select\");
        var noteEl = document.getElementById(\"edit-note-text\");
        if (!select || !noteEl) return;

        var projectionInstanceKey = session.projection_instance_key || App.selectedProjectionInstanceKey;
        var projectionRevision = session.projection_revision || App.selectedProjectionRevision;
        if (!projectionInstanceKey || !projectionRevision) {
            showEditStatus(\"无法保存：时段版本无效，请刷新后重试\", true);
            return;
        }

        var originalProjectId = String(session.project_id || \"\");
        var originalNote = session.session_note || \"\";
        var projectIdStr = canProject ? select.value : originalProjectId;
        var projectId = projectIdStr ? parseInt(projectIdStr, 10) : null;
        if (canProject && (!projectId || projectId <= 0)) {
            showEditStatus(\"请选择项目\", true);
            return;
        }
        var selectedProject = projectId ? findCachedProject(projectId) : null;
        if (canProject && !selectedProject) {
            showEditStatus(\"项目列表已过期，请刷新后重试\", true);
            return;
        }
        if (canProject && !App.projectSelectableForEditing(selectedProject)) {
            showEditStatus(\"所选项目当前不可编辑，请刷新后选择其他项目\", true);
            return;
        }

        var note = canNote ? noteEl.value : originalNote;
        if (canNote && note.length > 2000) {
            showEditStatus(\"备注不能超过 2000 个字符\", true);
            return;
        }
        var projectChanged = canProject && projectIdStr !== originalProjectId;
        var noteChanged = canNote && note !== originalNote;

        var adjustedDurationSeconds = null;
        var durationChanged = false;
        var durInput = document.getElementById(\"edit-duration-input\");
        if (canDuration) {
            var durRawValue = durInput ? (durInput.value || \"\").trim() : \"\";
            if (durRawValue !== \"\") {
                var durMinutes = parseInt(durRawValue, 10);
                if (isNaN(durMinutes) || durMinutes < 0) {
                    showEditStatus(\"时长需为非负整数\", true);
                    return;
                }
                adjustedDurationSeconds = durMinutes * 60;
            }
            var durBaselineSrc = (session.adjusted_duration_seconds != null)
                ? session.adjusted_duration_seconds
                : session.duration_seconds;
            var durBaselineMin = Math.round((parseInt(durBaselineSrc, 10) || 0) / 60);
            var durBaselineStr = isNaN(durBaselineMin) ? \"\" : String(durBaselineMin);
            durationChanged = durRawValue !== durBaselineStr;
        } else if (session.has_duration_override === true) {
            adjustedDurationSeconds = parseInt(session.adjusted_duration_seconds, 10);
            if (isNaN(adjustedDurationSeconds)) adjustedDurationSeconds = null;
        }

        if (!projectChanged && !noteChanged && !durationChanged) {
            showEditStatus(\"没有需要保存的更改\", false);
            return;
        }

        var dateEl = document.getElementById(\"timeline-date-input\");
        var reportDate = App.timelineDate || (dateEl ? dateEl.value : null);
        if (reportDate === \"--\" || reportDate === \"\") reportDate = null;
        if (!reportDate) {
            showEditStatus(\"无法保存：日期无效\", true);
            return;
        }

        setEditSaving(true);
        showEditStatus(\"\", false);
        var overrideProjectId = canProject
            && (projectChanged || session.has_project_override === true)
            ? projectId
            : null;
        var mutationOwner = App.timelineRequestState.nextMutationOwner(
            \"save_timeline_session_edit\",
            reportDate,
            projectionInstanceKey,
            projectionRevision,
            JSON.stringify([overrideProjectId, adjustedDurationSeconds, note])
        );
        if (!mutationOwner) {
            setEditSaving(false);
            blockDifferentMutationIntent();
            return;
        }
        mutationOwner.payload = [
            reportDate, projectionInstanceKey, projectionRevision, mutationOwner.requestId,
            overrideProjectId, adjustedDurationSeconds, note
        ];
        App.callBridge(
            \"save_timeline_session_edit\",
            reportDate,
            projectionInstanceKey,
            projectionRevision,
            mutationOwner.requestId,
            overrideProjectId,
            adjustedDurationSeconds,
            note
        ).then(function (result) {
            if (!App.timelineRequestState.isCurrentMutationOwner(mutationOwner)) return;
            if (!result || result.ok === false) {
                setEditSaving(false);
                showEditStatus(result && result.message ? result.message : \"保存失败\", true);
                App.timelineRequestState.releaseMutationOwner(mutationOwner, \"confirmed_failure\", result);
                return;
            }
            App.timelineRequestState.transitionMutation(mutationOwner, \"confirmed_success\", result);
            consumeMutationResult(result);
            setEditSaving(false);
            App.timelineRequestState.releaseMutationOwner(mutationOwner, \"confirmed_success\", result);
            showEditStatus(\"保存成功\", false);
            return refreshAfterConfirmedMutation().catch(function () {
                showEditStatus(\"操作已保存，但刷新失败\", true);
            });
        }).catch(function () {
            if (!App.timelineRequestState.isCurrentMutationOwner(mutationOwner)) return;
            markMutationUnknown(mutationOwner);
        });
    }
    App.saveEdit = saveEdit;""",
          )

          view_model = "worktrace/services/view_model_service.py"
          replace_once(view_model, "import json\n", "")
          replace_once(
              view_model,
              "from .settings_service import get_bool_setting, get_int_setting, get_setting\n",
              "from .runtime_activity_state_service import sample_runtime_activity_state\nfrom .settings_service import get_bool_setting, get_int_setting, get_setting\n",
          )
          replace_region(
              view_model,
              "def _get_current_activity_snapshot() -> ActivitySnapshotContract | None:",
              "    return value if isinstance(value, dict) else None",
              """def _get_current_activity_snapshot() -> ActivitySnapshotContract | None:
    return sample_runtime_activity_state().snapshot""",
          )

          db_path = "worktrace/db.py"
          replace_once(
              db_path,
              """    if version < CURRENT_SCHEMA_VERSION:
        _require_supported_source_schema(conn, version)
        version = migrate_schema(
            conn,
            current_version=version,
            target_version=CURRENT_SCHEMA_VERSION,
        )
    if version != CURRENT_SCHEMA_VERSION:
        raise ValueError(\"database_schema_incompatible\")

    # Index definitions and retired trigger removal are idempotent maintenance,
    # not a schema-version migration.  Run them for every supported database so
    # a v6 database created by an earlier build converges before fingerprinting.
    ensure_current_indexes(conn)
    _require_current_schema_fingerprint(conn)
    seed_defaults(conn)
""",
              """    migrated = False
    if version < CURRENT_SCHEMA_VERSION:
        _require_supported_source_schema(conn, version)
        version = migrate_schema(
            conn,
            current_version=version,
            target_version=CURRENT_SCHEMA_VERSION,
        )
        migrated = True
    if version != CURRENT_SCHEMA_VERSION:
        raise ValueError(\"database_schema_incompatible\")

    # Same-version maintenance accepts only the explicitly retired triggers.
    # Arbitrary malformed current-version schemas fail the fingerprint before
    # index DDL can obscure the compatibility error.
    drop_retired_schema_triggers(conn)
    if migrated:
        ensure_current_indexes(conn)
    _require_current_schema_fingerprint(conn)
    seed_defaults(conn)
""",
          )
          replace_once(
              db_path,
              """def ensure_current_indexes(conn: sqlite3.Connection) -> None:
    \"\"\"Converge indexes and remove retired command-style triggers.\"\"\"

    for trigger_name in _RETIRED_SCHEMA_TRIGGERS:
        conn.execute(f'DROP TRIGGER IF EXISTS \"{trigger_name}\"')
    conn.executescript(read_schema_indexes_sql())
""",
              """def drop_retired_schema_triggers(conn: sqlite3.Connection) -> None:
    \"\"\"Remove only the explicit legacy triggers accepted at this version.\"\"\"

    for trigger_name in _RETIRED_SCHEMA_TRIGGERS:
        conn.execute(f'DROP TRIGGER IF EXISTS \"{trigger_name}\"')


def ensure_current_indexes(conn: sqlite3.Connection) -> None:
    \"\"\"Install current indexes after trusted creation or migration.\"\"\"

    drop_retired_schema_triggers(conn)
    conn.executescript(read_schema_indexes_sql())
""",
          )
          replace_once(
              "tests/test_schema_initialization.py",
              "with pytest.raises((ValueError, sqlite3.OperationalError)):",
              "with pytest.raises(ValueError, match=\"database_schema_incompatible\"):",
          )

          hardening_test = "tests/test_architecture_hardening_regressions.py"
          replace_once(
              hardening_test,
              """    project_service,
    report_revision_service,
    report_session_edit_service,
    rule_batch_service,
""",
              """    overview_view_model_service,
    project_service,
    report_revision_service,
    report_session_edit_service,
    report_session_operation_service,
    rule_batch_service,
""",
          )
          replace_once(
              hardening_test,
              "    view_model_hardening_service,\n",
              "",
          )
          replace_once(
              hardening_test,
              "view_model_hardening_service.get_overview_view_model(DATE)",
              "overview_view_model_service.get_overview_view_model(DATE)",
          )
          replace_once(
              hardening_test,
              "report_session_edit_service.operations,",
              "report_session_operation_service,",
          )

          replace_once(
              "worktrace/services/report_session_edit_service.py",
              """# Transitional test/extension compatibility. Production code must call the
# public edit_session facade and must not import private UOW helpers.
operations = report_session_operation_service


""",
              "",
          )

          replace_once(
              "worktrace/runtime/app_runtime.py",
              """        from ..platforms.hardened_windows_adapter import HardenedWindowsAdapter

        return HardenedWindowsAdapter()
""",
              """        from ..platforms.hardened_windows_adapter import WindowsAdapter

        return WindowsAdapter()
""",
          )
          replace_once(
              "worktrace/platforms/hardened_windows_adapter.py",
              """# Compatibility import for external callers during the module rename.  The
# runtime uses ``WindowsAdapter`` directly; no second implementation exists.
HardenedWindowsAdapter = WindowsAdapter


__all__ = [\"WindowsAdapter\"]
""",
              """__all__ = [\"WindowsAdapter\"]
""",
          )

          current_state = "docs/current-state.md"
          replace_once(
              current_state,
              """  view_model_hardening_service (cross-surface metrics / structure revision adapter)
    view_model_service (page projection/materialization owner)
      activity_display_model_service (live display semantics owner)
""",
              """  overview/timeline/session_detail_view_model_service (page DTO owners)
    view_model_service (shared page projection components)
      activity_display_model_service (live display semantics owner)
""",
          )
          replace_once(
              current_state,
              """- `view_model_service` remains the page projection/materialization owner.
  `view_model_hardening_service` only corrects cross-surface metric/revision
  semantics and safe open-edit capability flags.
""",
              """- Page-specific ViewModel services own their public DTOs and share the same
  structural revision and canonical projection snapshot contracts.
""",
          )

          Path("worktrace/services/view_model_hardening_service.py").unlink()
          Path(".github/workflows/apply-architecture-source-transforms.yml").unlink()

      - name: Commit transformed sources
        shell: pwsh
        run: |
          git config user.name "worktrace-architecture-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Consolidate source ownership boundaries [skip ci]"
          git push origin "HEAD:${{ github.ref_name }}"
