name: Apply data replacement integrity

on:
  pull_request:
    paths:
      - .github/workflows/agent-data-integrity.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/canonical-architecture-consolidation
          fetch-depth: 0
          clean: true
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Configure repository
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge --no-ff origin/main -m "Sync main before data integrity [skip ci]"
      - name: Apply migration
        id: migrate
        continue-on-error: true
        shell: pwsh
        run: |
          python .github/agent_apply_data_integrity.py *> stage.log
          $code = $LASTEXITCODE
          Get-Content stage.log -Tail 240
          if ($code -ne 0) { exit $code }
      - name: Install dependencies
        if: steps.migrate.outcome == 'success'
        run: python -m pip install --disable-pip-version-check -q -r requirements.txt
      - name: Validate data integrity
        id: validate
        if: steps.migrate.outcome == 'success'
        continue-on-error: true
        shell: pwsh
        run: |
          "== compileall ==" | Set-Content validation.log
          python -m compileall -q worktrace *>> validation.log
          if ($LASTEXITCODE -ne 0) { Get-Content validation.log -Tail 300; exit 11 }
          "`n== pytest ==" | Add-Content validation.log
          python -m pytest -q tests/test_data_integrity_boundaries.py tests/test_frontend_generation_contract.py tests/test_activity_lifecycle_service.py tests/test_timeline_api_editing.py tests/test_secure_backup_service.py *>> validation.log
          if ($LASTEXITCODE -ne 0) { Get-Content validation.log -Tail 320; exit 12 }
          "`n== node ==" | Add-Content validation.log
          node --test tests/webview/*.test.js *>> validation.log
          if ($LASTEXITCODE -ne 0) { Get-Content validation.log -Tail 320; exit 13 }
          Get-Content validation.log -Tail 320
      - name: Capture diagnostics
        if: steps.migrate.outcome == 'failure' || steps.validate.outcome == 'failure'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force diagnostics | Out-Null
          @(
            "kind=data_integrity",
            "run_id=$env:GITHUB_RUN_ID",
            "head=$env:GITHUB_SHA",
            "captured_at=$([DateTime]::UtcNow.ToString('o'))",
            "",
            $(if (Test-Path stage.log) { Get-Content stage.log -Raw } else { "" }),
            "",
            $(if (Test-Path validation.log) { Get-Content validation.log -Raw } else { "" })
          ) | Set-Content diagnostics/agent-data-integrity-latest.txt -Encoding UTF8
          git checkout -B agent/worktrace-agent-diagnostics
          git add diagnostics/agent-data-integrity-latest.txt
          git commit -m "Capture data integrity diagnostics"
          git push --force origin HEAD:agent/worktrace-agent-diagnostics
          exit 1
      - name: Commit stage
        if: steps.migrate.outcome == 'success' && steps.validate.outcome == 'success'
        shell: pwsh
        run: |
          git rm .github/agent_apply_data_integrity.py .github/workflows/agent-data-integrity.yml
          git add -A
          git commit -m "Unify data replacement and domain validation"
          git push origin HEAD:agent/canonical-architecture-consolidation
