name: Repair pytest diagnostics

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: repair-pytest-diagnostics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  targeted:
    name: Repair diagnostic (${{ matrix.group }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - group: privacy-state
            tests: tests/test_state_machine.py tests/test_privacy_context_runtime_regressions.py
          - group: context-report-statistics
            tests: tests/test_context_service.py tests/test_statistics_service.py tests/test_statistics_api_summary.py tests/test_projection_revision_compatibility.py
          - group: clipboard-runtime
            tests: tests/test_clipboard_service.py tests/test_runtime_maintenance_control.py
          - group: maintenance-backup
            tests: tests/test_export_service.py tests/test_secure_backup_service.py tests/test_settings_privacy_status.py

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --disable-pip-version-check -q -r requirements.txt

      - name: Run targeted tests
        run: python -m pytest -q --tb=short ${{ matrix.tests }}
