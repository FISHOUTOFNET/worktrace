name: Apply canonical projection fix once

on:
  push:
    branches:
      - agent/canonical-projection-boundary-fix
    paths:
      - .github/workflows/apply-canonical-fix-once.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/apply-canonical-fix-once.yml

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  apply:
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/canonical-projection-boundary-fix
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Apply repository patch
        run: python scripts/apply_canonical_fix_once.py
      - name: Validate focused contracts
        id: focused
        shell: pwsh
        run: |
          & python -m compileall worktrace 2>&1 |
            Tee-Object -FilePath "focused-test.log"
          $code = $LASTEXITCODE
          if ($code -eq 0) {
            & python -m pytest -q `
              tests/test_projection_plain_dto_contract.py `
              tests/test_project_delete_contract.py `
              tests/test_webview_bridge_editing.py `
              tests/test_statistics_service.py::test_statistics_aggregation `
              tests/test_statistics_csv_export.py::test_build_csv_rows_all_statuses_exported `
              tests/test_export_resource_fields.py::test_excel_sessions_status_and_project_display_contract `
              tests/test_report_projection_architecture_contract.py `
              tests/test_run_affected_tests.py 2>&1 |
                Tee-Object -FilePath "focused-test.log" -Append
            $code = $LASTEXITCODE
          }
          exit $code
      - name: Publish focused failure to PR
        if: failure() && steps.focused.outcome == 'failure'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tail = (Get-Content -Path "focused-test.log" -Tail 220) -join "`n"
          $body = "### Focused validation failure`n`n``````text`n$tail`n```````n"
          Set-Content -Path "focused-comment.md" -Value $body -Encoding utf8
          gh api --method POST repos/FISHOUTOFNET/worktrace/issues/4/comments -F body=@focused-comment.md
      - name: Commit validated patch
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Complete canonical projection boundary cleanup"
          git push origin HEAD:agent/canonical-projection-boundary-fix
