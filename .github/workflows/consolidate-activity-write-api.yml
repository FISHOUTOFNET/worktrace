name: Consolidate activity write API

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/consolidate-activity-write-api.yml

permissions:
  contents: write

jobs:
  consolidate:
    if: github.event.pull_request.head.ref == 'agent/canonical-architecture-consolidation'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          clean: true
          show-progress: false
      - run: python scripts/consolidate_activity_write_api.py
      - shell: bash
        run: |
          git config user.name "worktrace-architecture-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git status --short
          git commit -m "Consolidate activity write API [skip ci]"
          git pull --rebase origin "${{ github.event.pull_request.head.ref }}"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
