name: Agent first pytest failure

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: agent-first-pytest-failure
  cancel-in-progress: true

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/runtime-maintenance-hardening
          clean: true
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Move clock boundary policy out of collector loop
        shell: pwsh
        run: |
          @'
          from pathlib import Path
          path = Path("worktrace/collector/collector.py")
          text = path.read_text(encoding="utf-8")
          old = "machine.reset_for_time_jump(discontinuity.safe_end_time)"
          new = "clock_tracker.apply_discontinuity(machine, discontinuity)"
          if old not in text:
              raise SystemExit("clock boundary source pattern not found")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          '@ | python -
      - name: Capture first failure
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          python -m pytest -x -q --cache-clear *> agent-pytest-first-failure.txt
          $exitCode = $LASTEXITCODE
          Add-Content agent-pytest-first-failure.txt "`nPYTEST_EXIT_CODE=$exitCode"
          exit 0
      - name: Commit source and diagnostic
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add worktrace/collector/collector.py agent-pytest-first-failure.txt
          git commit -m "Encapsulate clock boundary policy and record diagnostic"
          git push origin HEAD:agent/runtime-maintenance-hardening
