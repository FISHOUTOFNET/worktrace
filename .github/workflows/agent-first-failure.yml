name: Agent first pytest failure

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: agent-first-pytest-failure
  cancel-in-progress: true

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/runtime-maintenance-hardening
          clean: true
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Migrate secure backup lock contract
        shell: pwsh
        run: |
          @'
          from pathlib import Path

          path = Path("tests/test_secure_backup_service.py")
          text = path.read_text(encoding="utf-8")
          old = '''def test_existing_secure_import_in_progress_rejects_new_import(temp_db, tmp_path):
              out = _make_backup(tmp_path)
              coordinator = secure_backup_service.SECURE_IMPORT_COORDINATOR
              assert coordinator._import_lock.acquire(blocking=False)
              try:
                  with pytest.raises(BackupImportInProgressError):
                      secure_backup_service.import_encrypted_backup(out, "correct-passphrase")
              finally:
                  coordinator._import_lock.release()
          '''
          new = '''def test_existing_secure_import_in_progress_rejects_new_import(temp_db, tmp_path):
              out = _make_backup(tmp_path)
              coordinator = secure_backup_service.SECURE_IMPORT_COORDINATOR
              with coordinator.acquire(reason="test_existing_secure_import") as guard:
                  with pytest.raises(BackupImportInProgressError):
                      secure_backup_service.import_encrypted_backup(
                          out,
                          "correct-passphrase",
                      )
                  guard.mark_succeeded()
          '''
          if old in text:
              path.write_text(text.replace(old, new, 1), encoding="utf-8")
          elif new not in text:
              raise SystemExit("secure backup lock test pattern not found")
          '@ | python -
      - name: Capture pytest failures
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          python -m pytest -q --maxfail=20 --cache-clear *> agent-pytest-first-failure.txt
          $exitCode = $LASTEXITCODE
          Add-Content agent-pytest-first-failure.txt "`nPYTEST_EXIT_CODE=$exitCode"
          exit 0
      - name: Commit source and diagnostic
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/test_secure_backup_service.py agent-pytest-first-failure.txt
          git diff --cached --quiet; if ($LASTEXITCODE -eq 0) { exit 0 }
          git commit -m "Migrate maintenance tests and record diagnostics"
          git push origin HEAD:agent/runtime-maintenance-hardening
