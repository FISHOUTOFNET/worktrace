name: Apply runtime control architecture

on:
  pull_request:
    paths:
      - .github/workflows/agent-runtime-control.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/canonical-architecture-consolidation
          fetch-depth: 0
          clean: true
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Configure repository
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge --no-ff origin/main -m "Sync main before runtime control [skip ci]"
      - name: Apply migration
        id: migrate
        continue-on-error: true
        shell: pwsh
        run: |
          python .github/agent_fix_runtime_control_source.py
          python -c "from pathlib import Path; p=Path('.github/agent_apply_runtime_control.py'); s=p.read_text(encoding='utf-8'); old='    write(path, content[:start_index] + replacement + content[end_index:])'; new='    end_index += len(end)\n    write(path, content[:start_index] + replacement + content[end_index:])'; assert s.count(old) == 1, s.count(old); p.write_text(s.replace(old, new, 1), encoding='utf-8')"
          python .github/agent_apply_runtime_control.py *> stage.log
          $code = $LASTEXITCODE
          Get-Content stage.log -Tail 240
          if ($code -ne 0) { exit $code }
      - name: Install dependencies
        if: steps.migrate.outcome == 'success'
        run: python -m pip install --disable-pip-version-check -q -r requirements.txt
      - name: Validate runtime control
        id: validate
        if: steps.migrate.outcome == 'success'
        continue-on-error: true
        shell: pwsh
        run: |
          "== compileall ==" | Set-Content validation.log
          python -m compileall -q worktrace *>> validation.log
          if ($LASTEXITCODE -ne 0) { Get-Content validation.log -Tail 300; exit 11 }
          "`n== targeted pytest ==" | Add-Content validation.log
          python -m pytest -q tests/test_collector_runtime_restart_contract.py tests/test_runtime_maintenance_control.py tests/test_app_runtime_privacy_gate.py tests/test_runtime_architecture.py *>> validation.log
          if ($LASTEXITCODE -ne 0) { Get-Content validation.log -Tail 300; exit 12 }
          Get-Content validation.log -Tail 300
      - name: Capture diagnostics
        if: steps.migrate.outcome == 'failure' || steps.validate.outcome == 'failure'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force diagnostics/generated | Out-Null
          Copy-Item worktrace/runtime/app_runtime.py diagnostics/generated/app_runtime.py.txt
          Copy-Item worktrace/collector/collector.py diagnostics/generated/collector.py.txt
          Copy-Item worktrace/services/secure_backup_service.py diagnostics/generated/secure_backup_service.py.txt
          @(
            "kind=runtime_control",
            "run_id=$env:GITHUB_RUN_ID",
            "head=$env:GITHUB_SHA",
            "captured_at=$([DateTime]::UtcNow.ToString('o'))",
            "",
            $(if (Test-Path stage.log) { Get-Content stage.log -Raw } else { "" }),
            "",
            $(if (Test-Path validation.log) { Get-Content validation.log -Raw } else { "" })
          ) | Set-Content diagnostics/agent-runtime-control-latest.txt -Encoding UTF8
          git checkout -B agent/worktrace-agent-diagnostics
          git add diagnostics/agent-runtime-control-latest.txt diagnostics/generated
          git commit -m "Capture runtime control diagnostics"
          git push --force origin HEAD:agent/worktrace-agent-diagnostics
          exit 1
      - name: Commit stage
        if: steps.migrate.outcome == 'success' && steps.validate.outcome == 'success'
        shell: pwsh
        run: |
          git rm .github/agent_apply_runtime_control.py .github/agent_fix_runtime_control_source.py .github/workflows/agent-runtime-control.yml
          git add -A
          git commit -m "Harden collector lifecycle and maintenance commands"
          git push origin HEAD:agent/canonical-architecture-consolidation
