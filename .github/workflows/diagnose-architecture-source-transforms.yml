name: Diagnose architecture source transforms

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/diagnose-architecture-source-transforms.yml

permissions:
  contents: write

jobs:
  diagnose:
    if: github.event.pull_request.head.ref == 'agent/canonical-architecture-consolidation'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out PR head branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          clean: true
          show-progress: false

      - name: Execute or capture exact transform failure
        shell: python {0}
        run: |
          from pathlib import Path
          import subprocess
          import traceback

          diagnostic_path = Path('diagnostics/architecture-transform-error.txt')
          script_preview = ''
          try:
              source_path = Path('.github/workflows/apply-architecture-source-transforms.yml')
              lines = source_path.read_text(encoding='utf-8').splitlines()
              step_index = lines.index('      - name: Apply deterministic source transforms')
              run_index = lines.index('        run: |', step_index)
              end_index = lines.index('      - name: Commit transformed sources', run_index)
              raw_lines = lines[run_index + 1:end_index]
              script_lines = [
                  line[10:] if line.startswith('          ') else ''
                  for line in raw_lines
              ]
              script = '\n'.join(script_lines) + '\n'
              script_preview = '\n'.join(
                  f'{index + 1:02d}: {line!r}'
                  for index, line in enumerate(script_lines[:20])
              )
              exec(compile(script, str(source_path), 'exec'), {'__name__': '__main__'})
              diagnostic_path.unlink(missing_ok=True)
          except Exception:
              failure = traceback.format_exc()
              subprocess.run(['git', 'reset', '--hard', 'HEAD'], check=True)
              diagnostic_path.parent.mkdir(exist_ok=True)
              diagnostic_path.write_text(
                  failure + '\n\nEXTRACTED SCRIPT PREVIEW\n' + script_preview + '\n',
                  encoding='utf-8',
              )
          Path('.github/workflows/diagnose-architecture-source-transforms.yml').unlink(missing_ok=True)

      - name: Commit transform result or exact diagnostic
        shell: bash
        run: |
          git config user.name "worktrace-architecture-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Record architecture transform execution [skip ci]"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
