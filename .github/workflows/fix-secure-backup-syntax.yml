name: One-time secure backup syntax repair

on:
  push:
    branches: [agent/worktrace-architecture-hardening]
    paths: [.github/workflows/fix-secure-backup-syntax.yml]

permissions:
  contents: write

concurrency:
  group: secure-backup-syntax-repair
  cancel-in-progress: false

jobs:
  repair:
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 10
    steps:
      - name: Check out repair branch
        uses: actions/checkout@v4
        with:
          ref: agent/worktrace-architecture-hardening
          clean: true
          show-progress: false

      - name: Replace invalid try-else-finally guard
        shell: pwsh
        run: |
          @'
          from pathlib import Path

          path = Path("worktrace/services/secure_backup_service.py")
          source = path.read_text(encoding="utf-8")
          old = '''                try:\n                    yield state\n                else:\n                    state.succeeded = True\n                finally:\n                    with self._state_lock:\n                        self._write_gate = False\n'''
          new = '''                try:\n                    yield state\n                    state.succeeded = True\n                finally:\n                    with self._state_lock:\n                        self._write_gate = False\n'''
          if source.count(old) != 1:
              raise SystemExit("secure import guard patch anchor is not unique")
          path.write_text(source.replace(old, new, 1), encoding="utf-8", newline="\n")
          '@ | Set-Content -LiteralPath repair_secure_backup.py -Encoding UTF8
          python repair_secure_backup.py
          python -m py_compile worktrace/services/secure_backup_service.py
          Remove-Item -LiteralPath repair_secure_backup.py

      - name: Commit repair and remove one-time workflow
        shell: pwsh
        run: |
          Remove-Item -LiteralPath .github/workflows/fix-secure-backup-syntax.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add worktrace/services/secure_backup_service.py .github/workflows/fix-secure-backup-syntax.yml
          git commit -m "Fix secure import guard syntax [skip ci]"
          git push origin HEAD:agent/worktrace-architecture-hardening
