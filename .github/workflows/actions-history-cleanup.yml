name: One-time Actions history cleanup

on:
  pull_request:
    branches: [main]
    paths:
      - .github/actions-history-cleanup.trigger

permissions:
  actions: write
  contents: write

jobs:
  cleanup:
    name: Remove obsolete workflow runs and artifacts
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 15

    steps:
      - name: Clean Actions history
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          CURRENT_RUN_ID: ${{ github.run_id }}
          KEEP_CI_RUNS: "10"
        run: |
          $ErrorActionPreference = "Stop"
          $apiRoot = "https://api.github.com"
          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $repo = $env:REPOSITORY
          $currentRunId = [int64]$env:CURRENT_RUN_ID
          $keepCount = [int]$env:KEEP_CI_RUNS
          $ciPath = ".github/workflows/ci.yml"
          $cleanupPath = ".github/workflows/actions-history-cleanup.yml"

          function Invoke-Api {
            param(
              [Parameter(Mandatory = $true)][string]$Method,
              [Parameter(Mandatory = $true)][string]$Path,
              [object]$Body = $null
            )
            $params = @{
              Method = $Method
              Uri = "$apiRoot$Path"
              Headers = $headers
            }
            if ($null -ne $Body) {
              $params.ContentType = "application/json"
              $params.Body = ($Body | ConvertTo-Json -Compress)
            }
            return Invoke-RestMethod @params
          }

          function Get-PagedItems {
            param([string]$Path, [string]$Property)
            $items = [System.Collections.Generic.List[object]]::new()
            $page = 1
            do {
              $separator = if ($Path.Contains("?")) { "&" } else { "?" }
              $response = Invoke-Api -Method GET -Path "$Path${separator}per_page=100&page=$page"
              $batch = @($response.$Property)
              foreach ($item in $batch) { $items.Add($item) }
              $page += 1
            } while ($batch.Count -eq 100)
            return $items
          }

          $runs = @(Get-PagedItems -Path "/repos/$repo/actions/runs" -Property "workflow_runs")
          $keepIds = [System.Collections.Generic.HashSet[string]]::new()
          [void]$keepIds.Add([string]$currentRunId)

          $recentCiRuns = @(
            $runs |
              Where-Object { [string]$_.path -eq $ciPath } |
              Sort-Object { [DateTimeOffset]$_.created_at } -Descending |
              Select-Object -First $keepCount
          )
          foreach ($run in $recentCiRuns) { [void]$keepIds.Add([string]$run.id) }
          foreach ($run in $runs) {
            if ([string]$run.status -ne "completed" -and [string]$run.path -ne $cleanupPath) {
              [void]$keepIds.Add([string]$run.id)
            }
          }

          $staleRuns = @(
            $runs |
              Where-Object {
                [int64]$_.id -ne $currentRunId -and (
                  [string]$_.path -eq $cleanupPath -or (
                    [string]$_.status -eq "completed" -and
                    -not $keepIds.Contains([string]$_.id)
                  )
                )
              } |
              Sort-Object { [DateTimeOffset]$_.created_at }
          )
          $staleIds = [System.Collections.Generic.HashSet[string]]::new()
          foreach ($run in $staleRuns) { [void]$staleIds.Add([string]$run.id) }

          $artifacts = @(Get-PagedItems -Path "/repos/$repo/actions/artifacts" -Property "artifacts")
          $deletedArtifacts = 0
          foreach ($artifact in $artifacts) {
            $artifactRunId = if ($null -ne $artifact.workflow_run) { [string]$artifact.workflow_run.id } else { "" }
            if (-not [bool]$artifact.expired -and -not $staleIds.Contains($artifactRunId)) { continue }
            try {
              Invoke-Api -Method DELETE -Path "/repos/$repo/actions/artifacts/$($artifact.id)" | Out-Null
              $deletedArtifacts += 1
            }
            catch { Write-Warning "Artifact $($artifact.id) could not be deleted: $($_.Exception.Message)" }
          }

          $deletedRuns = 0
          foreach ($run in $staleRuns) {
            $runId = [int64]$run.id
            try {
              if ([string]$run.status -ne "completed") {
                try {
                  Invoke-Api -Method POST -Path "/repos/$repo/actions/runs/$runId/force-cancel" -Body @{} | Out-Null
                }
                catch {
                  try { Invoke-Api -Method POST -Path "/repos/$repo/actions/runs/$runId/cancel" -Body @{} | Out-Null } catch {}
                }
                Start-Sleep -Seconds 1
              }

              $deleted = $false
              for ($attempt = 1; $attempt -le 4; $attempt += 1) {
                try {
                  Invoke-Api -Method DELETE -Path "/repos/$repo/actions/runs/$runId" | Out-Null
                  $deleted = $true
                  break
                }
                catch { Start-Sleep -Seconds $attempt }
              }
              if ($deleted) { $deletedRuns += 1 } else { Write-Warning "Run $runId could not be deleted." }
            }
            catch { Write-Warning "Run $runId cleanup failed: $($_.Exception.Message)" }
          }

          foreach ($branch in @(
            "agent/actions-history-cleanup-20260715",
            "agent/actions-history-cleanup-merge",
            "agent/actions-history-cleanup-trigger"
          )) {
            try {
              Invoke-Api -Method DELETE -Path "/repos/$repo/git/refs/heads/$branch" | Out-Null
            }
            catch { Write-Warning "Temporary branch $branch could not be deleted: $($_.Exception.Message)" }
          }

          $summary = @(
            "## Actions history cleanup",
            "",
            "- Permanent workflow: $ciPath",
            "- Runs inspected: $($runs.Count)",
            "- Runs deleted: $deletedRuns",
            "- Runs retained: $($runs.Count - $deletedRuns)",
            "- Artifacts inspected: $($artifacts.Count)",
            "- Artifacts deleted: $deletedArtifacts"
          )
          $summary | ForEach-Object { Write-Host $_; Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $_ }

          try {
            Invoke-Api -Method DELETE -Path "/repos/$repo/actions/runs/$currentRunId" | Out-Null
          }
          catch { Write-Warning "One newest cleanup run record may remain: $($_.Exception.Message)" }
