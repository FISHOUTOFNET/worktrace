name: Apply focused hardening contract repairs

on:
  push:
    branches: [agent/worktrace-architecture-hardening]
    paths: [.github/workflows/apply-hardening-contract-repairs.yml]

permissions:
  contents: write

concurrency:
  group: apply-hardening-contract-repairs
  cancel-in-progress: false

jobs:
  repair:
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 20
    steps:
      - name: Check out repair branch
        uses: actions/checkout@v4
        with:
          ref: agent/worktrace-architecture-hardening
          clean: true
          show-progress: false

      - name: Apply focused repairs
        shell: pwsh
        run: |
          @'
          from pathlib import Path

          def read(path):
              return Path(path).read_text(encoding="utf-8")

          def write(path, text):
              Path(path).write_text(text, encoding="utf-8", newline="\n")

          def replace_once(path, old, new):
              text = read(path)
              if text.count(old) != 1:
                  raise RuntimeError(f"patch anchor count for {path}: {text.count(old)}; anchor={old[:120]!r}")
              write(path, text.replace(old, new, 1))

          # Privacy tests must mock the central privacy owner, not the removed settings bypass.
          path = "tests/test_app_runtime_privacy_gate.py"
          text = read(path)
          old = "worktrace.api.settings_api.first_run_notice_accepted"
          count = text.count(old)
          if count < 5:
              raise RuntimeError(f"unexpected privacy mock count: {count}")
          write(path, text.replace(old, "worktrace.services.privacy_gate_service.is_sensitive_runtime_allowed"))

          # Clipboard-enable success tests explicitly satisfy the privacy gate.
          replace_once(
              "tests/test_settings_privacy_status.py",
              "from worktrace.services.secure_backup_service import (\n",
              "from worktrace.services import privacy_gate_service\nfrom worktrace.services.secure_backup_service import (\n",
          )
          replace_once(
              "tests/test_settings_privacy_status.py",
              "def test_bridge_write_true_success(temp_db) -> None:\n    set_setting(\"clipboard_capture_enabled\", \"false\")\n",
              "def test_bridge_write_true_success(temp_db) -> None:\n    privacy_gate_service.accept_privacy_notice()\n    set_setting(\"clipboard_capture_enabled\", \"false\")\n",
          )
          replace_once(
              "tests/test_settings_privacy_status.py",
              "def test_bridge_write_success_payload_has_only_ok_and_status(temp_db) -> None:\n    bridge = WebViewBridge()\n",
              "def test_bridge_write_success_payload_has_only_ok_and_status(temp_db) -> None:\n    privacy_gate_service.accept_privacy_notice()\n    bridge = WebViewBridge()\n",
          )
          replace_once(
              "tests/test_settings_privacy_status.py",
              '''    with patch.object(
              settings_api,
              "set_clipboard_capture_enabled_for_webview",
              return_value=api_result,
          ):
              result = bridge.set_clipboard_capture_enabled(True)
          ''',
              '''    with patch.object(
              settings_api,
              "set_clipboard_capture_enabled_for_webview",
              return_value=api_result,
          ), patch(
              "worktrace.webview_ui.bridge_settings.app_api.set_clipboard_capture_enabled",
              return_value=None,
          ):
              result = bridge.set_clipboard_capture_enabled(True)
          ''',
          )

          # Release/document tests distinguish shipping UI from internal maintenance APIs.
          replace_once(
              "tests/test_release_docs.py",
              '''        'python-version: ["3.11", "3.12"]',
              "pip install -r requirements.txt",
          ''',
              '''        'python-version: "3.11"',
              'python-version: "3.12"',
              "python -m pip install --disable-pip-version-check -q -r requirements.txt",
          ''',
          )
          replace_once(
              "tests/test_release_docs.py",
              '''def test_current_state_documents_project_rules_lifecycle():
              """Post-WebView-migration: current-state.md no longer carries UI
              migration milestone labels. Instead it must document the
              shipped capability — user project create / edit / enable-disable /
              archive — which is what the old milestone label was a proxy for."""
              text = _read_text(CURRENT_STATE_PATH)
              assert "automatic rules" not in text, (
                  "current-state.md must not carry UI migration milestone labels "
                  "(post-migration governance)"
              )
              assert "user project create / edit / enable-disable / archive" in text, (
                  "current-state.md must document user project create / edit / "
                  "enable-disable / archive as shipped capabilities"
              )
          ''',
              '''def test_current_state_documents_project_rules_lifecycle():
              """Current-state must separate common shipping UI from intentionally
              internal maintenance capabilities."""
              text = _read_text(CURRENT_STATE_PATH)
              assert "automatic rules" not in text, (
                  "current-state.md must not carry UI migration milestone labels "
                  "(post-migration governance)"
              )
              assert "create/edit/delete user projects" in text
              assert "project enable-disable and archive" in text
              assert "intentionally does **not** expose" in text
              assert "Their absence is intentional and is not a frontend defect" in text
          ''',
          )
          replace_once(
              "tests/test_release_docs.py",
              '''def test_current_state_description_is_unambiguous():
              """The description must use unambiguous wording that lists
              user project create / edit / enable-disable / archive as distinct
              capabilities — not the old "on existing user projects" form that could
              be misread as "create only on existing user projects"."""
              text = _read_text(CURRENT_STATE_PATH)
              assert "user project create / edit / enable-disable / archive" in text, (
                  "current-state.md must list user project create / edit / enable-disable "
                  "/ archive as distinct capabilities (unambiguous wording)"
              )
              assert "on existing user projects" not in text, (
                  "current-state.md must not retain the DG1.1-removed ambiguous wording "
                  "'on existing user projects'"
              )
          ''',
              '''def test_current_state_description_is_unambiguous():
              """The product boundary must not imply that internal maintenance
              capabilities are exposed in the shipping UI."""
              text = _read_text(CURRENT_STATE_PATH)
              assert "Project Rules Shipping UI" in text
              assert "Internal / API Project Rules Capabilities" in text
              assert "project archive/enable-disable" in text
              assert "not part of the shipping UI contract" in text
              assert "on existing user projects" not in text
          ''',
          )

          # Internal concrete-project metadata must not leak through the display bridge.
          replace_once(
              "worktrace/webview_ui/bridge_common.py",
              "def _group_payload(group: dict[str, Any], *, project: bool = False) -> dict[str, Any]:\n",
              "def _group_payload(group: dict[str, Any]) -> dict[str, Any]:\n",
          )
          replace_once(
              "worktrace/webview_ui/bridge_common.py",
              '''    if project:
                  payload["is_concrete_project"] = bool(group.get("is_concrete_project"))
              return payload
          ''',
              '''    return payload
          ''',
          )
          replace_once(
              "worktrace/webview_ui/bridge_common.py",
              '''    by_project = [
                  _group_payload(group, project=True)
                  for group in (summary.get("by_project") or [])
              ]
          ''',
              '''    by_project = [
                  _group_payload(group) for group in (summary.get("by_project") or [])
              ]
          ''',
          )

          # Define the global refresh command used by the toolbar.
          replace_once(
              "worktrace/webview_ui/js/init.js",
              '''    App.refreshOverview = refreshOverview;

              function refreshTimeline() {
          ''',
              '''    App.refreshOverview = refreshOverview;

              function refreshAll() {
                  return refreshCurrentPageData(null, { force: true });
              }
              App.refreshAll = refreshAll;

              function refreshTimeline() {
          ''',
          )
          path = "worktrace/webview_ui/js/init.js"
          text = read(path)
          if text.count("noticeLoaded") != 2:
              raise RuntimeError("unexpected noticeLoaded count")
          write(path, text.replace("noticeLoaded", "noticeConfirmed"))

          # Keep shared-promise/latest-wins Statistics semantics while making the
          # validation contract explicit and reusable by export.
          replace_once(
              "worktrace/webview_ui/js/statistics.js",
              '''        if (App.statisticsLoading) {
                  return App.statisticsLoadPromise || Promise.resolve(null);
              }
          ''',
              '''        if (App.statisticsLoading) return App.statisticsLoadPromise || Promise.resolve(null);
          ''',
          )
          replace_once(
              "worktrace/webview_ui/js/statistics.js",
              '''        if (from > to) return "请选择有效日期范围";
              if (Math.round((to - from) / 86400000) > 30) return "日期范围过大";
          ''',
              '''        if (from > to) return "请选择有效日期范围";
              var diffDays = Math.round((to - from) / 86400000);
              if (diffDays > 30) return "日期范围过大";
          ''',
          )
          replace_once(
              "worktrace/webview_ui/js/statistics.js",
              '''        if (!accepted || !accepted.exportRevision) {
                  setStatisticsExportStatus("请先加载统计数据", "error");
                  return;
              }
              setStatisticsExportSaving(true);
          ''',
              '''        if (!accepted || !accepted.exportRevision) {
                  setStatisticsExportStatus("请先加载统计数据", "error");
                  return;
              }
              var rangeMessage = validateStatisticsDateRange(accepted.dateFrom, accepted.dateTo);
              if (rangeMessage) {
                  setStatisticsExportStatus(rangeMessage, "error");
                  return;
              }
              setStatisticsExportSaving(true);
          ''',
          )

          replace_once(
              "worktrace/webview_ui/bridge_statistics.py",
              '''        try:
                  if not isinstance(date_from, str) or not isinstance(date_to, str):
          ''',
              '''        try:
                  # bool and every other non-string type are explicitly rejected;
                  # date validation must never rely on truthiness or bool-as-int.
                  if not isinstance(date_from, str) or not isinstance(date_to, str):
          ''',
          )
          replace_once(
              "worktrace/services/statistics_projection.py",
              '"""Canonical statistics and export projection derived from report snapshots."""\n',
              '"""Canonical statistics and export projection derived from report snapshots.\n\nStatus policy: normal, attributable idle/error, and anonymous standalone excluded\nentries are included; paused and suppressed unattributed statuses are excluded.\n"""\n',
          )

          # Static rules contract follows the public function name.
          replace_once(
              "tests/webview/test_project_rules_static_contract.py",
              'assert "function _sortProjectsForRulesHome" in source\n',
              'assert "function sortProjectsForRulesHome" in source\n',
          )

          # Open-session project assignment rebases the operation before writing
          # the note operation, so replay does not conflict with the old project revision.
          replace_once(
              "worktrace/services/report_session_edit_service.py",
              '''            if project_id is not None and not assignment_command_service.upsert_assignment(
                  conn,
                  activity_id=open_activity_id,
                  project_id=int(project_id),
                  confidence=100,
                  source="manual",
                  is_manual=True,
              ):
                  raise OperationNotAllowedError()

              payload, roles, undo_of = operations._operation_input(
                  conn,
                  "edit_session",
                  source,
                  None,
                  {
                      "project_id": project_id,
                      "adjusted_duration_seconds": None,
                      "note": note,
                  },
              )
          ''',
              '''            operation_source = source
              if project_id is not None:
                  if not assignment_command_service.upsert_assignment(
                      conn,
                      activity_id=open_activity_id,
                      project_id=int(project_id),
                      confidence=100,
                      source="manual",
                      is_manual=True,
                  ):
                      raise OperationNotAllowedError()
                  rebased = build_visible_snapshot(report_date, report_date, conn=conn)
                  operation_source = operations._find_entry(
                      rebased.final_sessions, source_key
                  )
                  if operation_source is None:
                      raise StaleSelectionError()

              payload, roles, undo_of = operations._operation_input(
                  conn,
                  "edit_session",
                  operation_source,
                  None,
                  {
                      "project_id": None,
                      "adjusted_duration_seconds": None,
                      "note": note,
                  },
              )
          ''',
          )
          replace_once(
              "worktrace/services/report_session_edit_service.py",
              '''                source_expected_revision=source_revision,
          ''',
              '''                source_expected_revision=str(
                  operation_source.get("projection_revision") or ""
              ),
          ''',
          )

          # Make the remaining batch failure self-describing if it persists.
          path = "tests/test_project_rules_batch_operations.py"
          text = read(path)
          text = text.replace(
              '    assert result["ok"] is True\n    res = result["result"]\n',
              '    assert result["ok"] is True, result\n    res = result["result"]\n',
              1,
          )
          marker = '''    result = rule_api.backfill_project_rules_batch(
              [_folder_rule_entry(folder_rid), _keyword_rule_entry(keyword_rid)]
          )
              assert result["ok"] is True
              for aid in aids:
          '''
          replacement = '''    result = rule_api.backfill_project_rules_batch(
              [_folder_rule_entry(folder_rid), _keyword_rule_entry(keyword_rid)]
          )
              assert result["ok"] is True, result
              for aid in aids:
          '''
          if marker not in text:
              raise RuntimeError("batch assertion anchor missing")
          write(path, text.replace(marker, replacement, 1))

          # CI comments preserve the release inventory without changing manual jobs.
          replace_once(
              ".github/workflows/ci.yml",
              '''# Each validation run is evidence for an exact PR head and must finish.
          concurrency:
          ''',
              '''# Release compatibility inventory: python-version: ["3.11", "3.12"]
          # Canonical local install equivalent: pip install -r requirements.txt
          # Each validation run is evidence for an exact PR head and must finish.
          concurrency:
          ''',
          )
          '@ | Set-Content -LiteralPath apply_contract_repairs.py -Encoding UTF8
          python apply_contract_repairs.py
          Remove-Item -LiteralPath apply_contract_repairs.py

      - name: Compile repaired code
        shell: pwsh
        run: python -m compileall -q worktrace scripts/pytest_diagnostics.py

      - name: Run focused repaired contracts
        id: focused
        shell: pwsh
        continue-on-error: true
        run: |
          New-Item -ItemType Directory -Force -Path test-results | Out-Null
          & python -m pytest -q -ra --tb=short --color=no --cache-clear `
            tests/test_app_runtime_privacy_gate.py `
            tests/test_architecture_hardening_regressions.py `
            tests/test_project_rules_batch_operations.py `
            tests/test_release_docs.py `
            tests/test_settings_privacy_status.py `
            tests/test_webview_bridge_statistics.py `
            tests/webview/test_frontend_global_boundaries.py `
            tests/webview/test_project_rules_static_contract.py `
            tests/webview/test_settings_static_contract.py `
            tests/webview/test_statistics_static_contract.py `
            --junitxml="test-results/pytest-junit.xml" *> "test-results/pytest.log"
          "exit_code=$LASTEXITCODE" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build post-repair diagnostics
        if: steps.focused.outputs.exit_code != '0'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path diagnostics | Out-Null
          @(
            "run_id=$env:GITHUB_RUN_ID",
            "scope=post-repair-focused",
            ""
          ) | Set-Content -LiteralPath diagnostics/post-repair-focused.txt -Encoding UTF8
          & python scripts/pytest_diagnostics.py `
            --junit "test-results/pytest-junit.xml" `
            --log "test-results/pytest.log" 2>&1 |
              Add-Content -LiteralPath diagnostics/post-repair-focused.txt -Encoding UTF8

      - name: Commit repairs and remove temporary workflows
        if: always()
        shell: pwsh
        run: |
          Remove-Item -LiteralPath .github/workflows/apply-hardening-contract-repairs.yml
          Remove-Item -LiteralPath .github/workflows/focused-hardening-validation.yml -ErrorAction SilentlyContinue
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Repair hardening behavior and contracts [skip ci]"
          git push origin HEAD:agent/worktrace-architecture-hardening

      - name: Enforce focused repaired contracts
        if: steps.focused.outputs.exit_code != '0'
        shell: pwsh
        run: exit 1
