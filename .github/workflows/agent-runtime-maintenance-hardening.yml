name: Apply runtime maintenance hardening

on:
  push:
    branches: [agent/runtime-maintenance-hardening]
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: agent-runtime-maintenance-hardening
  cancel-in-progress: false

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/runtime-maintenance-hardening
          clean: true
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Apply source changes
        run: python .github/agent_runtime_hardening.py
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Validate source
        shell: pwsh
        run: |
          python scripts/test_inventory.py --check
          python -m compileall worktrace
          python -m pytest -q --cache-clear
          node --test tests/webview/*.test.js
      - name: Commit changes
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add worktrace tests scripts
          if (git diff --cached --quiet) {
            Write-Host "No source changes to commit"
            exit 0
          }
          git commit -m "Harden runtime maintenance and privacy boundaries"
          git push origin HEAD:agent/runtime-maintenance-hardening
