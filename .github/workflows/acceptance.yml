name: Acceptance

on:
  pull_request:
    types:
      - ready_for_review
      - synchronize
      - reopened

permissions:
  actions: read
  contents: read

concurrency:
  group: acceptance-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  validate:
    name: Final acceptance
    if: github.event.pull_request.draft == false
    uses: ./.github/workflows/_validation.yml
    with:
      revision: ${{ github.event.pull_request.head.sha }}
      run_node_tests: true
      run_build_smoke: true
