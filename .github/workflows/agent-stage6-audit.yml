name: Run architecture contract audit

on:
  pull_request:
    paths:
      - .github/workflows/agent-stage6-audit.yml

permissions:
  contents: write

jobs:
  audit:
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/canonical-architecture-consolidation
          clean: true
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -q -r requirements.txt
      - name: Run full Python contract suite
        id: pytest
        continue-on-error: true
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force test-results | Out-Null
          python scripts/test_inventory.py --check *> test-results/inventory.log
          if ($LASTEXITCODE -ne 0) { exit 10 }
          python -m compileall -q worktrace scripts *> test-results/compile.log
          if ($LASTEXITCODE -ne 0) { exit 11 }
          python -m pytest -q -ra --tb=short --color=no --cache-clear --junitxml=test-results/pytest-junit.xml *> test-results/pytest.log
          $code = $LASTEXITCODE
          Get-Content test-results/pytest.log -Tail 320
          if ($code -ne 0) { exit $code }
      - name: Run all Node contracts
        id: node
        continue-on-error: true
        shell: pwsh
        run: |
          node --test tests/webview/*.test.js *> test-results/node.log
          $code = $LASTEXITCODE
          Get-Content test-results/node.log -Tail 320
          if ($code -ne 0) { exit $code }
      - name: Publish audit diagnostics
        if: steps.pytest.outcome == 'failure' || steps.node.outcome == 'failure'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force diagnostics | Out-Null
          @(
            "kind=stage6_audit",
            "run_id=$env:GITHUB_RUN_ID",
            "actual_head=$(git rev-parse HEAD)",
            "pytest_outcome=${{ steps.pytest.outcome }}",
            "node_outcome=${{ steps.node.outcome }}",
            "",
            "=== INVENTORY ===",
            $(if (Test-Path test-results/inventory.log) { Get-Content test-results/inventory.log -Raw } else { "" }),
            "=== COMPILE ===",
            $(if (Test-Path test-results/compile.log) { Get-Content test-results/compile.log -Raw } else { "" }),
            "=== PYTEST ===",
            $(if (Test-Path test-results/pytest.log) { Get-Content test-results/pytest.log -Raw } else { "" }),
            "=== NODE ===",
            $(if (Test-Path test-results/node.log) { Get-Content test-results/node.log -Raw } else { "" })
          ) | Set-Content diagnostics/agent-stage6-audit-latest.txt -Encoding UTF8
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B agent/worktrace-agent-diagnostics
          git add diagnostics/agent-stage6-audit-latest.txt
          git commit -m "Capture stage 6 architecture audit"
          git push --force origin HEAD:agent/worktrace-agent-diagnostics
          exit 1
      - name: Confirm audit
        if: steps.pytest.outcome == 'success' && steps.node.outcome == 'success'
        run: echo "Full Python and Node contract audit passed."
