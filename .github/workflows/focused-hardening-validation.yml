name: Focused architecture hardening validation

on:
  push:
    branches: [agent/worktrace-architecture-hardening]
    paths: [.github/workflows/focused-hardening-validation.yml]

permissions:
  contents: write

concurrency:
  group: focused-architecture-hardening
  cancel-in-progress: false

jobs:
  focused:
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 20
    steps:
      - name: Check out exact revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          clean: true
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: python -m pip install --disable-pip-version-check -q -r requirements.txt

      - name: Compile Python
        shell: pwsh
        run: python -m compileall -q worktrace scripts/pytest_diagnostics.py

      - name: Run focused contracts
        id: pytest
        shell: pwsh
        continue-on-error: true
        run: |
          New-Item -ItemType Directory -Force -Path test-results | Out-Null
          & python -m pytest -q -ra --tb=short --color=no --cache-clear `
            tests/test_app_runtime_privacy_gate.py `
            tests/test_architecture_hardening_regressions.py `
            tests/test_project_rules_batch_operations.py `
            tests/test_release_docs.py `
            tests/test_settings_privacy_status.py `
            tests/test_webview_bridge_statistics.py `
            tests/test_webview_packaging.py `
            tests/webview/test_frontend_global_boundaries.py `
            tests/webview/test_project_rules_static_contract.py `
            tests/webview/test_settings_static_contract.py `
            tests/webview/test_statistics_static_contract.py `
            --junitxml="test-results/pytest-junit.xml" *> "test-results/pytest.log"
          "exit_code=$LASTEXITCODE" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build focused diagnostics
        if: steps.pytest.outputs.exit_code != '0'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path diagnostics | Out-Null
          @(
            "run_id=$env:GITHUB_RUN_ID",
            "tested_head=$env:GITHUB_SHA",
            "scope=focused-hardening",
            ""
          ) | Set-Content -LiteralPath diagnostics/focused-hardening-latest.txt -Encoding UTF8
          & python scripts/pytest_diagnostics.py `
            --junit "test-results/pytest-junit.xml" `
            --log "test-results/pytest.log" 2>&1 |
              Add-Content -LiteralPath diagnostics/focused-hardening-latest.txt -Encoding UTF8

      - name: Publish focused diagnostics
        if: steps.pytest.outputs.exit_code != '0'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B worktrace-ci-focused-diagnostics
          git add diagnostics/focused-hardening-latest.txt
          git commit -m "Capture focused hardening diagnostics for run $env:GITHUB_RUN_ID"
          git push --force origin HEAD:agent/worktrace-ci-focused-diagnostics

      - name: Enforce focused result
        if: steps.pytest.outputs.exit_code != '0'
        shell: pwsh
        run: exit 1
