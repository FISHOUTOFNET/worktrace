name: CI

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: runtime-settings-inventory-${{ github.ref }}
  cancel-in-progress: false

jobs:
  runtime-settings-inventory:
    name: Runtime settings compatibility inventory
    if: github.event.pull_request.head.ref == 'agent/canonical-architecture-consolidation'
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 10

    steps:
      - name: Check out exact inventory revision
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          clean: true
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build compatibility inventory
        run: python scripts/inventory_runtime_settings_compat.py

      - name: Publish inventory and restore standard CI
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          $diagnosticPath = "diagnostics/runtime-settings-compat-inventory.txt"
          git add $diagnosticPath
          git commit -m "Capture runtime settings compatibility inventory"
          git push --force origin "HEAD:agent/worktrace-ci-diagnostics"

          git reset --hard $env:GITHUB_SHA
          if (Test-Path -LiteralPath $diagnosticPath) {
            Remove-Item -LiteralPath $diagnosticPath -Force
          }
          git fetch origin agent/canonical-architecture-consolidation
          $remoteHead = git rev-parse origin/agent/canonical-architecture-consolidation
          if ($remoteHead -ne $env:GITHUB_SHA) {
            throw "feature branch moved during compatibility inventory"
          }

          $parent = git rev-parse "$env:GITHUB_SHA^"
          git checkout $parent -- .github/workflows/ci.yml
          git rm scripts/inventory_runtime_settings_compat.py
          git commit -m "Capture runtime settings compatibility inventory [skip ci]"
          git push origin "HEAD:agent/canonical-architecture-consolidation"
