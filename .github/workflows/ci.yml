name: CI

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  failure-list:
    name: Read complete pytest failure list
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 5

    steps:
      - name: Print failing test identities
        shell: pwsh
        run: |
          $path = "test-results/pytest-junit.xml"
          if (-not (Test-Path -LiteralPath $path)) {
            Write-Host "NO_JUNIT_FILE"
            exit 0
          }
          [xml]$document = Get-Content -LiteralPath $path -Raw
          $nodes = @($document.SelectNodes("//testcase[failure or error]"))
          Write-Host "FAILURE_COUNT=$($nodes.Count)"
          foreach ($node in $nodes) {
            Write-Host "FAILED_CASE=$($node.classname)::$($node.name)"
          }
