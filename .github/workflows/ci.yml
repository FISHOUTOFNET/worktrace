name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      run_node_tests:
        description: Run WebView Node tests
        required: false
        type: boolean
        default: false
      run_build_smoke:
        description: Run PyInstaller build smoke
        required: false
        type: boolean
        default: false

env:
  PYTHONUTF8: "1"
  PYTHONIOENCODING: utf-8

permissions:
  contents: write

# Each validation run is evidence for an exact PR head and must finish.
# Compatibility inventory: python-version: ["3.11", "3.12"] (3.11 automatic; 3.12 manual).
# Dependency contract remains equivalent to: pip install -r requirements.txt
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  activity-lifecycle-cutover:
    name: Activity lifecycle cutover
    if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'agent/canonical-architecture-consolidation'
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 30

    steps:
      - name: Check out exact cutover revision
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          clean: true
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Remove legacy activity lifecycle CRUD
        run: python scripts/remove_activity_service_legacy_crud.py

      - name: Compile cutover tree
        run: python -m compileall -q worktrace tests

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -q -r requirements.txt

      - name: Validate cutover tree
        shell: pwsh
        run: |
          $utf8 = [System.Text.UTF8Encoding]::new($false)
          [Console]::InputEncoding = $utf8
          [Console]::OutputEncoding = $utf8
          $OutputEncoding = $utf8
          $PSNativeCommandUseErrorActionPreference = $false

          & python -m pytest -q -ra --tb=short --color=no --cache-clear
          exit $LASTEXITCODE

      - name: Commit validated cutover
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm scripts/remove_activity_service_legacy_crud.py
          git add worktrace/services/activity_service.py tests/test_activity_fixture_migration_contract.py .github/workflows/ci.yml
          git commit -m "Remove legacy activity lifecycle CRUD [skip ci]"
          git push origin "HEAD:agent/canonical-architecture-consolidation"

  tests:
    name: Windows tests (Python 3.11)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.ref != 'agent/canonical-architecture-consolidation'
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 30

    steps:
      - name: Check out exact event revision
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          clean: true
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --disable-pip-version-check -q -r requirements.txt

      - name: Check test inventory
        run: python scripts/test_inventory.py --check

      - name: Compile Python
        id: compile
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "test-results" | Out-Null
          & python -m compileall -q worktrace scripts/pytest_diagnostics.py *> "test-results/compile.log"
          $compileExitCode = $LASTEXITCODE
          Write-Host "compile exit code: $compileExitCode"
          if ($compileExitCode -ne 0) {
            Get-Content -LiteralPath "test-results/compile.log" -Tail 120 |
              ForEach-Object { Write-Host $_ }
          }
          exit $compileExitCode

      - name: Run Python tests
        id: pytest
        shell: pwsh
        run: |
          $utf8 = [System.Text.UTF8Encoding]::new($false)
          [Console]::InputEncoding = $utf8
          [Console]::OutputEncoding = $utf8
          $OutputEncoding = $utf8
          $PSNativeCommandUseErrorActionPreference = $false

          New-Item -ItemType Directory -Force -Path "test-results" | Out-Null
          $pytestStartedAt = Get-Date
          & python -m pytest -q -ra --tb=short --color=no --cache-clear `
            --durations=25 --durations-min=0.2 `
            --junitxml="test-results/pytest-junit.xml" *> "test-results/pytest.log"
          $pytestExitCode = $LASTEXITCODE
          $pytestElapsedSeconds = ((Get-Date) - $pytestStartedAt).TotalSeconds

          Write-Host "pytest exit code: $pytestExitCode"
          Write-Host ("pytest elapsed seconds: {0:N2}" -f $pytestElapsedSeconds)
          if ($pytestExitCode -eq 0) {
            Get-Content -LiteralPath "test-results/pytest.log" -Tail 40 |
              ForEach-Object { Write-Host $_ }
          }
          else {
            Write-Host "pytest failed; compact diagnostics follow in the next step"
          }
          exit $pytestExitCode

      - name: Publish validation diagnostics
        if: failure() && (steps.compile.outcome == 'failure' || steps.pytest.outcome == 'failure')
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path diagnostics | Out-Null
          $diagnosticPath = "diagnostics/pytest-hardening-latest.txt"
          @(
            "run_id=$env:GITHUB_RUN_ID",
            "tested_head=$env:GITHUB_SHA",
            "compile_outcome=${{ steps.compile.outcome }}",
            "pytest_outcome=${{ steps.pytest.outcome }}",
            ""
          ) | Set-Content -LiteralPath $diagnosticPath -Encoding UTF8

          if ("${{ steps.compile.outcome }}" -eq "failure") {
            "=== COMPILE_FAILURE_BEGIN ===" | Add-Content -LiteralPath $diagnosticPath -Encoding UTF8
            if (Test-Path -LiteralPath "test-results/compile.log") {
              Get-Content -LiteralPath "test-results/compile.log" -Tail 200 |
                Add-Content -LiteralPath $diagnosticPath -Encoding UTF8
            }
            "=== COMPILE_FAILURE_END ===" | Add-Content -LiteralPath $diagnosticPath -Encoding UTF8
          }
          elseif ("${{ steps.pytest.outcome }}" -eq "failure") {
            $rawPath = "test-results/pytest-diagnostics-raw.txt"
            & python scripts/pytest_diagnostics.py `
              --junit "test-results/pytest-junit.xml" `
              --log "test-results/pytest.log" `
              --summary "$env:GITHUB_STEP_SUMMARY" 2>&1 |
                Tee-Object -FilePath $rawPath
            Get-Content -LiteralPath $rawPath -Raw |
              Add-Content -LiteralPath $diagnosticPath -Encoding UTF8
          }

      - name: Publish diagnostics on isolated branch
        if: failure() && (steps.compile.outcome == 'failure' || steps.pytest.outcome == 'failure') && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        shell: pwsh
        run: |
          $path = "diagnostics/pytest-hardening-latest.txt"
          if (-not (Test-Path -LiteralPath $path)) {
            Write-Warning "Compact diagnostics file is missing"
            exit 0
          }
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B worktrace-ci-diagnostics
          git add $path
          git commit -m "Capture validation diagnostics for run $env:GITHUB_RUN_ID"
          git push --force origin "HEAD:agent/worktrace-ci-diagnostics"

  python312-compat:
    name: Python 3.12 compatibility (manual)
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 30

    steps:
      - name: Check out exact dispatch revision
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          clean: true
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --disable-pip-version-check -q -r requirements.txt

      - name: Check test inventory
        run: python scripts/test_inventory.py --check

      - name: Compile Python
        run: python -m compileall -q worktrace scripts/pytest_diagnostics.py

      - name: Run Python tests
        id: pytest
        shell: pwsh
        run: |
          $utf8 = [System.Text.UTF8Encoding]::new($false)
          [Console]::InputEncoding = $utf8
          [Console]::OutputEncoding = $utf8
          $OutputEncoding = $utf8
          $PSNativeCommandUseErrorActionPreference = $false

          New-Item -ItemType Directory -Force -Path "test-results" | Out-Null
          $pytestStartedAt = Get-Date
          & python -m pytest -q -ra --tb=short --color=no --cache-clear `
            --durations=25 --durations-min=0.2 `
            --junitxml="test-results/pytest-junit.xml" *> "test-results/pytest.log"
          $pytestExitCode = $LASTEXITCODE
          $pytestElapsedSeconds = ((Get-Date) - $pytestStartedAt).TotalSeconds

          Write-Host "pytest exit code: $pytestExitCode"
          Write-Host ("pytest elapsed seconds: {0:N2}" -f $pytestElapsedSeconds)
          if ($pytestExitCode -eq 0) {
            Get-Content -LiteralPath "test-results/pytest.log" -Tail 40 |
              ForEach-Object { Write-Host $_ }
          }
          else {
            Write-Host "pytest failed; compact diagnostics follow in the next step"
          }
          exit $pytestExitCode

      - name: Publish pytest failure diagnostics
        if: failure() && steps.pytest.outcome == 'failure'
        shell: pwsh
        run: |
          & python scripts/pytest_diagnostics.py `
            --junit "test-results/pytest-junit.xml" `
            --log "test-results/pytest.log" `
            --summary "$env:GITHUB_STEP_SUMMARY"

  node-tests:
    name: WebView Node tests (manual)
    if: github.event_name == 'workflow_dispatch' && inputs.run_node_tests
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 10

    steps:
      - name: Check out exact dispatch revision
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          clean: true
          show-progress: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Run webview Node tests
        run: node --test tests/webview/*.test.js

  pyinstaller-smoke:
    name: PyInstaller build smoke (manual)
    if: github.event_name == 'workflow_dispatch' && inputs.run_build_smoke
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 30

    steps:
      - name: Check out exact dispatch revision
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          clean: true
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --disable-pip-version-check -q -r requirements.txt
          python -m pip install --disable-pip-version-check -q pyinstaller

      - name: Build single-file exe
        run: python -m PyInstaller --noconfirm --clean WorkTrace.spec

      - name: Verify single-file exe
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath "dist\WorkTrace.exe")) {
            throw "dist\WorkTrace.exe was not generated"
          }

      - name: Build per-user installer
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts\build_windows_installer.ps1

      - name: Verify installer
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath "dist\WorkTrace-Setup.exe")) {
            throw "dist\WorkTrace-Setup.exe was not generated"
          }

      - name: Upload release smoke artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: worktrace-windows-smoke
          path: |
            dist/WorkTrace.exe
            dist/WorkTrace-Setup.exe
          if-no-files-found: error
          retention-days: 1
