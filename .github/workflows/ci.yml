name: CI

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: runtime-settings-cutover-${{ github.ref }}
  cancel-in-progress: false

jobs:
  runtime-settings-cutover:
    name: Runtime settings hard cutover
    if: github.event.pull_request.head.ref == 'agent/canonical-architecture-consolidation'
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 30

    steps:
      - name: Check out exact cutover revision
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          clean: true
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Apply runtime settings cutover
        id: cutover_apply
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "test-results" | Out-Null
          & python scripts/cutover_runtime_settings.py *> "test-results/cutover-apply.log"
          $applyExitCode = $LASTEXITCODE
          Write-Host "runtime/settings cutover apply exit code: $applyExitCode"
          if ($applyExitCode -ne 0) {
            Get-Content -LiteralPath "test-results/cutover-apply.log" -Tail 200 |
              ForEach-Object { Write-Host $_ }
          }
          exit $applyExitCode

      - name: Compile cutover tree
        run: python -m compileall -q worktrace tests

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -q -r requirements.txt

      - name: Validate cutover tree
        id: cutover_pytest
        shell: pwsh
        run: |
          $utf8 = [System.Text.UTF8Encoding]::new($false)
          [Console]::InputEncoding = $utf8
          [Console]::OutputEncoding = $utf8
          $OutputEncoding = $utf8
          $PSNativeCommandUseErrorActionPreference = $false

          New-Item -ItemType Directory -Force -Path "test-results" | Out-Null
          & python -m pytest -q -ra --tb=short --color=no --cache-clear `
            --junitxml="test-results/pytest-junit.xml" *> "test-results/pytest.log"
          $pytestExitCode = $LASTEXITCODE
          Write-Host "runtime/settings cutover pytest exit code: $pytestExitCode"
          if ($pytestExitCode -eq 0) {
            Get-Content -LiteralPath "test-results/pytest.log" -Tail 40 |
              ForEach-Object { Write-Host $_ }
          }
          else {
            Write-Host "runtime/settings cutover failed; diagnostics will be published"
          }
          exit $pytestExitCode

      - name: Publish cutover diagnostics
        if: failure() && (steps.cutover_apply.outcome == 'failure' || steps.cutover_pytest.outcome == 'failure')
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path diagnostics | Out-Null
          $diagnosticPath = "diagnostics/runtime-settings-cutover-latest.txt"
          @(
            "run_id=$env:GITHUB_RUN_ID",
            "tested_head=${{ github.event.pull_request.head.sha }}",
            "apply_outcome=${{ steps.cutover_apply.outcome }}",
            "pytest_outcome=${{ steps.cutover_pytest.outcome }}",
            "",
            "=== RUNTIME_SETTINGS_CUTOVER_FAILURE_BEGIN ==="
          ) | Set-Content -LiteralPath $diagnosticPath -Encoding UTF8

          if ("${{ steps.cutover_apply.outcome }}" -eq "failure") {
            if (Test-Path -LiteralPath "test-results/cutover-apply.log") {
              Get-Content -LiteralPath "test-results/cutover-apply.log" -Tail 300 |
                Add-Content -LiteralPath $diagnosticPath -Encoding UTF8
            }
          }
          elseif ("${{ steps.cutover_pytest.outcome }}" -eq "failure") {
            $rawPath = "test-results/runtime-settings-diagnostics-raw.txt"
            & python scripts/pytest_diagnostics.py `
              --junit "test-results/pytest-junit.xml" `
              --log "test-results/pytest.log" `
              --summary "$env:GITHUB_STEP_SUMMARY" 2>&1 |
                Tee-Object -FilePath $rawPath
            Get-Content -LiteralPath $rawPath -Raw |
              Add-Content -LiteralPath $diagnosticPath -Encoding UTF8
          }

          "=== RUNTIME_SETTINGS_CUTOVER_FAILURE_END ===" |
            Add-Content -LiteralPath $diagnosticPath -Encoding UTF8

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add $diagnosticPath
          git commit -m "Capture runtime settings cutover diagnostics for run $env:GITHUB_RUN_ID"
          git push --force origin "HEAD:agent/worktrace-ci-diagnostics"

      - name: Commit validated cutover
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          $parent = git rev-parse "$env:GITHUB_SHA^"
          git checkout $parent -- .github/workflows/ci.yml
          git rm scripts/cutover_runtime_settings.py
          git add worktrace tests .github/workflows/ci.yml
          git commit -m "Separate runtime state from durable settings [skip ci]"
          git push origin "HEAD:agent/canonical-architecture-consolidation"
