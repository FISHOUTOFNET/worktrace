name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      run_node_tests:
        description: Run WebView Node tests
        required: false
        type: boolean
        default: false
      run_build_smoke:
        description: Run PyInstaller build smoke
        required: false
        type: boolean
        default: false

env:
  PYTHONUTF8: "1"
  PYTHONIOENCODING: utf-8

permissions:
  contents: read
  issues: write

# Each validation run is evidence for an exact PR head and must finish.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tests:
    name: Windows tests (Python 3.11)
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          clean: true
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --disable-pip-version-check -q -r requirements.txt

      - name: Check test inventory
        run: python scripts/test_inventory.py --check

      - name: Compile Python
        run: python -m compileall -q worktrace scripts/pytest_diagnostics.py

      - name: Run Python tests
        id: pytest
        shell: pwsh
        run: |
          $utf8 = [System.Text.UTF8Encoding]::new($false)
          [Console]::InputEncoding = $utf8
          [Console]::OutputEncoding = $utf8
          $OutputEncoding = $utf8
          $PSNativeCommandUseErrorActionPreference = $false

          New-Item -ItemType Directory -Force -Path "test-results" | Out-Null
          & python -m pytest -q -ra --tb=short --color=no --cache-clear `
            --junitxml="test-results/pytest-junit.xml" *> "test-results/pytest.log"
          $pytestExitCode = $LASTEXITCODE

          Write-Host "pytest exit code: $pytestExitCode"
          if ($pytestExitCode -eq 0) {
            Get-Content -LiteralPath "test-results/pytest.log" -Tail 5 |
              ForEach-Object { Write-Host $_ }
          }
          else {
            Write-Host "pytest failed; compact diagnostics follow in the next step"
          }
          exit $pytestExitCode

      - name: Publish pytest failure diagnostics
        if: failure() && steps.pytest.outcome == 'failure'
        shell: pwsh
        run: |
          & python scripts/pytest_diagnostics.py `
            --junit "test-results/pytest-junit.xml" `
            --log "test-results/pytest.log" `
            --summary "$env:GITHUB_STEP_SUMMARY" 2>&1 |
              Tee-Object -FilePath "test-results/pytest-diagnostics.txt"

      - name: Post compact diagnostics to pull request
        if: failure() && steps.pytest.outcome == 'failure' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          $diagnosticsPath = "test-results/pytest-diagnostics.txt"
          if (-not (Test-Path -LiteralPath $diagnosticsPath)) {
            Write-Warning "Compact diagnostics file is missing"
            exit 0
          }
          $diagnostics = Get-Content -LiteralPath $diagnosticsPath -Raw
          if ($diagnostics.Length -gt 50000) {
            $diagnostics = $diagnostics.Substring(0, 50000) + "`n... truncated ..."
          }
          $comment = @"
          <!-- worktrace-pytest-diagnostics -->
          ## Pytest diagnostics for run $env:GITHUB_RUN_ID

          ```text
          $diagnostics
          ```
          "@
          $payload = @{ body = $comment } | ConvertTo-Json -Depth 3
          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          Invoke-RestMethod `
            -Method POST `
            -Uri "https://api.github.com/repos/$env:REPOSITORY/issues/$env:PR_NUMBER/comments" `
            -Headers $headers `
            -ContentType "application/json" `
            -Body $payload | Out-Null

  python312-compat:
    name: Python 3.12 compatibility (manual)
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          clean: true
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --disable-pip-version-check -q -r requirements.txt

      - name: Check test inventory
        run: python scripts/test_inventory.py --check

      - name: Compile Python
        run: python -m compileall -q worktrace scripts/pytest_diagnostics.py

      - name: Run Python tests
        id: pytest
        shell: pwsh
        run: |
          $utf8 = [System.Text.UTF8Encoding]::new($false)
          [Console]::InputEncoding = $utf8
          [Console]::OutputEncoding = $utf8
          $OutputEncoding = $utf8
          $PSNativeCommandUseErrorActionPreference = $false

          New-Item -ItemType Directory -Force -Path "test-results" | Out-Null
          & python -m pytest -q -ra --tb=short --color=no --cache-clear `
            --junitxml="test-results/pytest-junit.xml" *> "test-results/pytest.log"
          $pytestExitCode = $LASTEXITCODE

          Write-Host "pytest exit code: $pytestExitCode"
          if ($pytestExitCode -eq 0) {
            Get-Content -LiteralPath "test-results/pytest.log" -Tail 5 |
              ForEach-Object { Write-Host $_ }
          }
          else {
            Write-Host "pytest failed; compact diagnostics follow in the next step"
          }
          exit $pytestExitCode

      - name: Publish pytest failure diagnostics
        if: failure() && steps.pytest.outcome == 'failure'
        shell: pwsh
        run: |
          & python scripts/pytest_diagnostics.py `
            --junit "test-results/pytest-junit.xml" `
            --log "test-results/pytest.log" `
            --summary "$env:GITHUB_STEP_SUMMARY"

  node-tests:
    name: WebView Node tests (manual)
    if: github.event_name == 'workflow_dispatch' && inputs.run_node_tests
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          clean: true
          show-progress: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run webview Node tests
        run: node --test tests/webview/*.test.js

  pyinstaller-smoke:
    name: PyInstaller build smoke (manual)
    if: github.event_name == 'workflow_dispatch' && inputs.run_build_smoke
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          clean: true
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --disable-pip-version-check -q -r requirements.txt
          python -m pip install --disable-pip-version-check -q pyinstaller

      - name: Build single-file exe
        run: python -m PyInstaller --noconfirm --clean WorkTrace.spec

      - name: Verify single-file exe
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath "dist\WorkTrace.exe")) {
            throw "dist\WorkTrace.exe was not generated"
          }

      - name: Build per-user installer
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts\build_windows_installer.ps1

      - name: Verify installer
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath "dist\WorkTrace-Setup.exe")) {
            throw "dist\WorkTrace-Setup.exe was not generated"
          }

      - name: Upload release smoke artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: worktrace-windows-smoke
          path: |
            dist/WorkTrace.exe
            dist/WorkTrace-Setup.exe
          if-no-files-found: error
          retention-days: 1
