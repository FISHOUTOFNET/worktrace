name: CI

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-runner:
    name: Release runner for guarded patch
    runs-on: [self-hosted, Windows, X64]
    steps:
      - run: Write-Host "Runner released for guarded repository patch"
