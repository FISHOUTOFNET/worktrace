name: CI

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: runtime-settings-call-inventory-${{ github.ref }}
  cancel-in-progress: false

jobs:
  runtime-settings-call-inventory:
    name: Runtime settings call inventory
    if: github.event.pull_request.head.ref == 'agent/canonical-architecture-consolidation'
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 10

    steps:
      - name: Check out exact inventory revision
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          clean: true
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build precise call inventory
        run: python scripts/inventory_runtime_settings_calls.py

      - name: Publish inventory
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add diagnostics/runtime-settings-call-inventory.txt
          git commit -m "Capture precise runtime settings call inventory"
          git push --force origin "HEAD:agent/worktrace-ci-diagnostics"
