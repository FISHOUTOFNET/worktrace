name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: project-transition-cutover-${{ github.ref }}
  cancel-in-progress: false

jobs:
  project-transition-cutover:
    name: Remove legacy project transition mirrors
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.ref == 'agent/canonical-architecture-consolidation'
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 30

    steps:
      - name: Check out exact cutover revision
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          clean: true
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Apply project transition cutover
        id: cutover
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "test-results" | Out-Null
          & python scripts/cutover_project_transition.py *> "test-results/project-transition-cutover.log"
          $exitCode = $LASTEXITCODE
          Write-Host "project transition cutover exit code: $exitCode"
          if ($exitCode -ne 0) {
            Get-Content -LiteralPath "test-results/project-transition-cutover.log" -Tail 240 |
              ForEach-Object { Write-Host $_ }
          }
          exit $exitCode

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -q -r requirements.txt

      - name: Check test inventory
        run: python scripts/test_inventory.py --check

      - name: Compile cutover tree
        run: python -m compileall -q worktrace tests

      - name: Validate cutover tree
        id: pytest
        shell: pwsh
        run: |
          $utf8 = [System.Text.UTF8Encoding]::new($false)
          [Console]::InputEncoding = $utf8
          [Console]::OutputEncoding = $utf8
          $OutputEncoding = $utf8
          $PSNativeCommandUseErrorActionPreference = $false
          New-Item -ItemType Directory -Force -Path "test-results" | Out-Null
          & python -m pytest -q -ra --tb=short --color=no --cache-clear `
            --junitxml="test-results/pytest-junit.xml" *> "test-results/pytest.log"
          $exitCode = $LASTEXITCODE
          Write-Host "project transition pytest exit code: $exitCode"
          if ($exitCode -eq 0) {
            Get-Content -LiteralPath "test-results/pytest.log" -Tail 40 |
              ForEach-Object { Write-Host $_ }
          }
          else {
            & python scripts/pytest_diagnostics.py `
              --junit "test-results/pytest-junit.xml" `
              --log "test-results/pytest.log" `
              --summary "$env:GITHUB_STEP_SUMMARY"
          }
          exit $exitCode

      - name: Commit validated cutover and start standard CI
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --no-tags --depth=1 origin b31fbac5831b1437007583d3a850b34f46ad4007
          git checkout b31fbac5831b1437007583d3a850b34f46ad4007 -- .github/workflows/ci.yml
          git rm -f scripts/cutover_project_transition.py
          git add worktrace tests .github/workflows/ci.yml
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            throw "cutover produced no committed changes"
          }
          git commit -m "Remove legacy project transition snapshot mirrors [skip ci]"
          git push origin "HEAD:agent/canonical-architecture-consolidation"

          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $payload = @{
            ref = "agent/canonical-architecture-consolidation"
            inputs = @{
              run_node_tests = "false"
              run_build_smoke = "false"
            }
          } | ConvertTo-Json -Depth 4
          $uri = "$env:GITHUB_API_URL/repos/$env:GITHUB_REPOSITORY/actions/workflows/ci.yml/dispatches"
          Invoke-RestMethod -Method Post -Uri $uri -Headers $headers -Body $payload -ContentType "application/json"
          Write-Host "standard CI dispatched for $(git rev-parse HEAD)"
