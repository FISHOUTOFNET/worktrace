name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    name: Standard validation
    uses: ./.github/workflows/_validation.yml
    with:
      revision: ${{ github.event.pull_request.head.sha || github.sha }}
      run_node_tests: true
      run_build_smoke: true
