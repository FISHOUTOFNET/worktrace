name: CI

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  failure-list:
    name: Read current failure details
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 5

    steps:
      - name: Print pytest failure details
        shell: pwsh
        run: |
          $path = "test-results/pytest-junit.xml"
          if (-not (Test-Path -LiteralPath $path)) {
            Write-Host "NO_JUNIT_FILE"
            exit 0
          }
          [xml]$document = Get-Content -LiteralPath $path -Raw
          $nodes = @($document.SelectNodes("//testcase[failure or error]"))
          Write-Host "FAILURE_COUNT=$($nodes.Count)"
          foreach ($node in $nodes) {
            $failure = $node.failure
            if ($null -eq $failure) { $failure = $node.error }
            $message = (([string]$failure.message) -replace "`r|`n", " ")
            $text = (([string]$failure.InnerText) -replace "`r", "")
            if ($message.Length -gt 1000) { $message = $message.Substring(0, 1000) }
            if ($text.Length -gt 2500) { $text = $text.Substring(0, 2500) }
            Write-Host "FAILED_CASE=$($node.classname)::$($node.name)"
            Write-Host "FAILED_MESSAGE=$message"
            Write-Host "FAILED_TEXT=$text"
          }

      - name: Print comment hygiene report
        shell: pwsh
        run: |
          & python scripts/comment_hygiene.py --check
          Write-Host "COMMENT_HYGIENE_EXIT=$LASTEXITCODE"
          exit 0
