name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Windows tests (Python 3.11)
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Check test inventory
        run: python scripts/test_inventory.py --check

      - name: Compile Python
        run: python -m compileall worktrace

      - name: Run Python tests
        id: pytest
        shell: pwsh
        continue-on-error: true
        run: |
          & python -m pytest -q --cache-clear 2>&1 | Tee-Object -FilePath pytest.log
          exit $LASTEXITCODE

      - name: Print pytest failure tail
        if: steps.pytest.outcome == 'failure'
        shell: pwsh
        run: Get-Content -LiteralPath pytest.log -Tail 500

      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-python-3.11
          path: pytest.log
          if-no-files-found: error
          retention-days: 1

      - name: Enforce pytest result
        if: steps.pytest.outcome == 'failure'
        shell: pwsh
        run: exit 1

  python312-compat:
    name: Python 3.12 compatibility (manual)
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Check test inventory
        run: python scripts/test_inventory.py --check

      - name: Compile Python
        run: python -m compileall worktrace

      - name: Run Python tests
        id: pytest
        shell: pwsh
        continue-on-error: true
        run: |
          & python -m pytest -q --cache-clear 2>&1 | Tee-Object -FilePath pytest.log
          exit $LASTEXITCODE

      - name: Print pytest failure tail
        if: steps.pytest.outcome == 'failure'
        shell: pwsh
        run: Get-Content -LiteralPath pytest.log -Tail 500

      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-python-${{ matrix.python-version }}
          path: pytest.log
          if-no-files-found: error
          retention-days: 1

      - name: Enforce pytest result
        if: steps.pytest.outcome == 'failure'
        shell: pwsh
        run: exit 1

  node-tests:
    name: WebView Node tests
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run webview Node tests
        run: node --test tests/webview/*.test.js

  pyinstaller-smoke:
    name: PyInstaller build smoke
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build single-file exe
        run: python -m PyInstaller --noconfirm --clean WorkTrace.spec

      - name: Verify single-file exe
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath "dist\WorkTrace.exe")) {
            throw "dist\WorkTrace.exe was not generated"
          }

      - name: Build per-user installer
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts\build_windows_installer.ps1

      - name: Verify installer
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath "dist\WorkTrace-Setup.exe")) {
            throw "dist\WorkTrace-Setup.exe was not generated"
          }

      - name: Upload release smoke artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: worktrace-windows-smoke
          path: |
            dist/WorkTrace.exe
            dist/WorkTrace-Setup.exe
          if-no-files-found: error
          retention-days: 1
