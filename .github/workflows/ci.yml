name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  actions: read
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Standard validation keeps full failure diagnostics observable through bounded log partitions.
  validate:
    name: Standard validation
    uses: ./.github/workflows/_validation.yml
    with:
      revision: ${{ github.event.pull_request.head.sha || github.sha }}
      run_node_tests: false
      run_build_smoke: false
