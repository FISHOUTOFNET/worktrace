name: Architecture hardening diagnostics

on:
  push:
    branches: [agent/worktrace-architecture-hardening]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    name: Capture project-count failure
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/worktrace-architecture-hardening
          clean: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          check-latest: false
      - name: Install dependencies
        shell: pwsh
        run: python -m pip install --disable-pip-version-check -q -r requirements.txt
      - name: Capture failing assertion
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path diagnostics | Out-Null
          python -m pytest -vv --tb=long tests/test_architecture_hardening_regressions.py::test_project_count_excludes_uncategorized_and_excluded_buckets *> diagnostics/project-count.txt
          if ($LASTEXITCODE -eq 0) { "test passed" | Set-Content diagnostics/project-count.txt }
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add diagnostics/project-count.txt
          git commit -m "Capture project count diagnostic [skip ci]"
          git push origin HEAD:agent/worktrace-architecture-hardening
