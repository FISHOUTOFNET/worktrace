name: Architecture hardening diagnostics

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hardening-diagnostics-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    name: Focused hardening contracts
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          check-latest: false
      - name: Install dependencies
        shell: pwsh
        run: python -m pip install --disable-pip-version-check -q -r requirements.txt
      - name: Clear-all privacy contract
        shell: pwsh
        run: python -m pytest -q --tb=short tests/test_architecture_hardening_regressions.py::test_clear_all_preserves_installation_privacy_but_pauses_sensitive_runtime
      - name: Structure revision contract
        shell: pwsh
        run: python -m pytest -q --tb=short tests/test_architecture_hardening_regressions.py::test_structure_revision_ignores_open_duration_but_tracks_structure
      - name: Export revision contract
        shell: pwsh
        run: python -m pytest -q --tb=short tests/test_architecture_hardening_regressions.py::test_export_revision_is_exact_closed_record_revision
      - name: Project count contract
        shell: pwsh
        run: python -m pytest -q --tb=short tests/test_architecture_hardening_regressions.py::test_project_count_excludes_uncategorized_and_excluded_buckets
      - name: Open session edit contract
        shell: pwsh
        run: python -m pytest -q --tb=short tests/test_architecture_hardening_regressions.py::test_persisted_open_session_allows_project_and_note_but_not_duration
      - name: Frontend coordination contract
        shell: pwsh
        run: python -m pytest -q --tb=short tests/test_architecture_hardening_regressions.py::test_frontend_generation_and_coalescing_contracts_are_shipping
