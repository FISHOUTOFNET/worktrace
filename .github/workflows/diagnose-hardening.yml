name: Architecture hardening diagnostics

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hardening-diagnostics-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    name: Focused hardening contracts
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          check-latest: false
      - name: Install dependencies
        shell: pwsh
        run: python -m pip install --disable-pip-version-check -q -r requirements.txt
      - name: Architecture hardening regressions
        shell: pwsh
        run: python -m pytest -q --tb=short --maxfail=10 tests/test_architecture_hardening_regressions.py
      - name: Settings privacy status
        shell: pwsh
        run: python -m pytest -q --tb=short --maxfail=10 tests/test_settings_privacy_status.py
      - name: Runtime privacy gate
        shell: pwsh
        run: python -m pytest -q --tb=short --maxfail=10 tests/test_app_runtime_privacy_gate.py
      - name: Statistics summary
        shell: pwsh
        run: python -m pytest -q --tb=short --maxfail=10 tests/test_statistics_api_summary.py
      - name: CSV export
        shell: pwsh
        run: python -m pytest -q --tb=short --maxfail=10 tests/test_export_service.py
      - name: Rule batch operations
        shell: pwsh
        run: python -m pytest -q --tb=short --maxfail=10 tests/test_project_rules_batch_operations.py
      - name: Projection cutover
        shell: pwsh
        run: python -m pytest -q --tb=short --maxfail=10 tests/test_report_projection_cutover.py
      - name: Projection architecture contract
        shell: pwsh
        run: python -m pytest -q --tb=short --maxfail=10 tests/test_report_projection_architecture_contract.py
      - name: WebView entry contracts
        shell: pwsh
        run: python -m pytest -q --tb=short --maxfail=10 tests/test_webview_entry.py
