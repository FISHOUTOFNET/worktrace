[pytest]
markers =
    unit: Pure function or single-service tests that do not depend on real threads, WebView GUI, or packaging flow.
    db: Tests that use SQLite, temp_db, or directly read/write the database.
    contract: API, ViewModel, payload, boundary, or static contract tests.
    integration: Cross service, API, bridge, or runtime integration tests.
    webview_static: WebView static contract tests that directly read HTML, CSS, or JavaScript source.
    live_display: Live clock, snapshot, ViewModel overlay, current/recent/timeline/details synchronization, or frontend projection tests.
    collector_runtime: Collector loop, pause/resume, idle, runtime startup gate, thread, or control channel tests.
    security_privacy: Encryption, backup, privacy boundary, excluded/anonymized records, or sensitive information leak tests.
    packaging: PyInstaller, installer, release docs, spec, or packaging smoke tests.
    slow: Tests with noticeably high runtime or release/manual validation context.
    serial: Tests that should not be run in parallel in the future. Marker only; parallel execution is not enabled.
    parallel_safe: Tests that are candidates for future parallel execution. Marker only; parallel execution is not enabled.
