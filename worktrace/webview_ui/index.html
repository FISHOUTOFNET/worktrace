<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkTrace</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-brand">WorkTrace</div>
            <nav class="sidebar-nav">
                <button class="nav-item active" data-page="overview">概览</button>
                <button class="nav-item" data-page="timeline">时间详情</button>
                <button class="nav-item" data-page="statistics">统计与导出</button>
                <button class="nav-item" data-page="rules">项目规则</button>
                <button class="nav-item" data-page="settings">设置与隐私</button>
            </nav>
            <div class="sidebar-status">
                <div id="status-display" class="status-display">采集器未运行</div>
                <button id="toggle-pause-btn" class="toggle-btn">开始记录</button>
            </div>
        </aside>
        <main class="content">
            <section id="page-overview" class="page active">
                <header class="page-header">
                    <h1>今日概览</h1>
                    <button id="refresh-btn" class="refresh-btn">刷新</button>
                </header>
                <div id="overview-error" class="error-banner" hidden>加载失败，请稍后重试。</div>
                <div class="kpi-grid">
                    <div class="kpi-card">
                        <div class="kpi-label">今日日期</div>
                        <div id="kpi-date" class="kpi-value">--</div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-label">今日总时长</div>
                        <div id="kpi-total" class="kpi-value">00:00:00</div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-label">今日项目数</div>
                        <div id="kpi-projects" class="kpi-value">0</div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-label">已归类时长</div>
                        <div id="kpi-classified" class="kpi-value">00:00:00</div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-label">未归类时长</div>
                        <div id="kpi-uncategorized" class="kpi-value">00:00:00</div>
                    </div>
                </div>
                <div class="current-card">
                    <div class="card-title">当前活动</div>
                    <div id="current-activity" class="current-text">当前活动：无</div>
                </div>
                <div class="recent-card">
                    <div class="card-title">最近活动</div>
                    <div id="recent-list" class="recent-list">
                        <div class="recent-empty">暂无活动</div>
                    </div>
                </div>
            </section>
            <section id="page-timeline" class="page">
                <header class="page-header">
                    <h1>时间详情</h1>
                    <div class="timeline-date-nav">
                        <button id="timeline-prev-btn" class="date-nav-btn" type="button">&lt;</button>
                        <span id="timeline-date-display" class="date-display">--</span>
                        <button id="timeline-next-btn" class="date-nav-btn" type="button">&gt;</button>
                        <button id="timeline-today-btn" class="date-nav-btn today-btn" type="button">今日</button>
                    </div>
                </header>
                <div id="timeline-error" class="error-banner" hidden>加载失败，请稍后重试。</div>
                <div id="timeline-loading" class="timeline-loading" hidden>加载中…</div>
                <div class="timeline-summary">
                    <div class="timeline-total-card">
                        <span class="timeline-total-label">当日总时长</span>
                        <span id="timeline-total" class="timeline-total-value">00:00:00</span>
                    </div>
                    <div id="timeline-current" class="timeline-current">当前活动：无</div>
                </div>
                <div class="timeline-layout">
                    <div class="timeline-sessions">
                        <div class="card-title">活动时段</div>
                        <div id="timeline-sessions-list" class="timeline-list">
                            <div class="timeline-empty">暂无活动</div>
                        </div>
                    </div>
                    <div class="timeline-details">
                        <div id="timeline-details-header" class="timeline-details-header">选择左侧时段查看详情</div>
                        <div id="timeline-details-list" class="timeline-list"></div>
                    </div>
                </div>
            </section>
            <section id="page-statistics" class="page">
                <div class="placeholder">WebView 迁移中，当前页面仍由旧 UI 支持。</div>
            </section>
            <section id="page-rules" class="page">
                <div class="placeholder">WebView 迁移中，当前页面仍由旧 UI 支持。</div>
            </section>
            <section id="page-settings" class="page">
                <div class="placeholder">WebView 迁移中，当前页面仍由旧 UI 支持。</div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
